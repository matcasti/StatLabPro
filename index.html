      <div style={{marginBottom:16,display:'flex',gap:8,flexWrap:'wrap'}}>
        <span className={`pill ${sigCls(r.p)}`} style={{fontSize:12,padding:'4px 12px'}}>F({r.dfb},{r.dfw}) = {fmt(r.F,3)}, p {fmtP(r.p)} {sig(r.p)}</span>
        <span className="pill pill-green" style={{fontSize:12,padding:'4px 12px'}}>η² = {fmt(r.eta2,3)}</span>
      </div>
      <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>ANOVA Table</div>
      <table className="result-table" style={{marginBottom:20}}>
        <thead><tr><th>Source</th><th>SS</th><th>df</th><th>MS</th><th>F</th><th>p</th></tr></thead>
        <tbody>
          <tr><td>Between Groups</td><td>{fmt(r.ssb)}</td><td>{r.dfb}</td><td>{fmt(r.msb)}</td><td>{fmt(r.F,4)}</td><td><SigBadge p={r.p}/></td></tr>
          <tr><td>Within Groups</td><td>{fmt(r.ssw)}</td><td>{r.dfw}</td><td>{fmt(r.msw)}</td><td>—</td><td>—</td></tr>
          <tr style={{fontWeight:600}}><td>Total</td><td>{fmt(r.ssb+r.ssw)}</td><td>{r.dfb+r.dfw}</td><td>—</td><td>—</td><td>—</td></tr>
        </tbody>
      </table>
      <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>Group Statistics</div>
      <table className="result-table" style={{marginBottom:20}}>
        <thead><tr><th>Group</th><th>n</th><th>Mean</th><th>SD</th><th>SE</th></tr></thead>
        <tbody>{r.groups.map(g=><tr key={g.group}><td style={{fontWeight:600}}>{g.group}</td><td>{g.n}</td><td>{fmt(g.mean)}</td><td>{fmt(g.sd)}</td><td>{fmt(g.se)}</td></tr>)}</tbody>
      </table>
      {r.tukey.length>0&&(<>
        <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>Post-Hoc: Tukey HSD</div>
        <table className="result-table">
          <thead><tr><th>Group 1</th><th>Group 2</th><th>Difference</th><th>SE</th><th>q</th></tr></thead>
          <tbody>{r.tukey.map((t,i)=><tr key={i}><td>{t.g1}</td><td>{t.g2}</td><td>{fmt(t.diff)}</td><td>{fmt(t.se)}</td><td>{fmt(t.q,3)}</td></tr>)}</tbody>
        </table>
      </>)}
      <SigLegend/>
    </div>
  );
  if(r._type==='corr')return(
    <div className="fade-in">
      <h2 style={{fontFamily:"'Crimson Pro',serif",fontSize:22,fontWeight:600,marginBottom:4}}>
        {r.method==='spearman'?'Spearman':'Pearson'} Correlation Matrix
      </h2>
      <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:18}}>Upper triangle: r values. Lower triangle: p-values.</p>
      <div style={{overflowX:'auto',marginBottom:20}}>
        <table className="result-table">
          <thead><tr><th></th>{r.cols.map(c=><th key={c} style={{fontFamily:'monospace',fontSize:11}}>{c}</th>)}</tr></thead>
          <tbody>{r.cols.map((c1,i)=>(
            <tr key={c1}>
              <td style={{fontWeight:600,fontSize:12}}>{c1}</td>
              {r.cols.map((c2,j)=>{
                const cell=r.matrix[i][j];
                if(i===j)return<td key={c2} style={{color:'#D1D5DB',textAlign:'center'}}>—</td>;
                if(i<j){const rv=cell.r;const col=rv>0.7?'#1D4ED8':rv>0.3?'#3B82F6':rv<-0.7?'#DC2626':rv<-0.3?'#F87171':'#9CA3AF';return<td key={c2} style={{textAlign:'center',fontFamily:'monospace',color:col,fontWeight:Math.abs(rv)>0.5?700:400,fontSize:13}}>{rv.toFixed(3)}</td>;}
                return<td key={c2} style={{textAlign:'center'}}><SigBadge p={cell.p}/></td>;
              })}
            </tr>
          ))}</tbody>
        </table>
      </div>
      <SigLegend/>
    </div>
  );
  if(r._type==='ols')return(
    <div className="fade-in">
      <h2 style={{fontFamily:"'Crimson Pro',serif",fontSize:22,fontWeight:600,marginBottom:4}}>Linear Regression (OLS)</h2>
      <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:16}}><strong>{r.dep}</strong> ~ {r.preds.join(' + ')} · n = {r.n}</p>
      <div style={{display:'grid',gridTemplateColumns:g3(4),gap:12,marginBottom:20}}>
        {[['R²',fmt(r.r2,4)],['Adj. R²',fmt(r.r2adj,4)],['F stat',fmt(r.f,3)],['RMSE',fmt(r.rmse,4)]].map(([l,v])=><StatCard key={l} label={l} value={v}/>)}
      </div>
      <div style={{marginBottom:8,display:'flex',gap:8,alignItems:'center'}}>
        <span style={{fontSize:13,fontWeight:600}}>Coefficients</span>
        <span className={`pill ${sigCls(r.p_f)}`}>F p {fmtP(r.p_f)}</span>
      </div>
      <table className="result-table" style={{marginBottom:20}}>
        <thead><tr><th>Term</th><th>β (Estimate)</th><th>Std. Error</th><th>t value</th><th>p</th><th>95% CI</th></tr></thead>
        <tbody>{r.names.map((name,i)=>(
          <tr key={name}>
            <td style={{fontWeight:600}}>{name}</td>
            <td>{fmt(r.beta[i])}</td><td>{fmt(r.se_b[i])}</td><td>{fmt(r.t_v[i],3)}</td>
            <td><SigBadge p={r.p_v[i]}/></td>
            <td style={{fontFamily:'monospace',fontSize:11}}>[{fmt(r.ci_lo[i],3)}, {fmt(r.ci_hi[i],3)}]</td>
          </tr>
        ))}</tbody>
      </table>
      <div style={{padding:12,background:'var(--paper)',borderRadius:8,fontSize:12,color:'var(--text-muted)',marginBottom:12}}>
        Model explains {(r.r2*100).toFixed(1)}% of variance (R²={fmt(r.r2,3)}, Adj. R²={fmt(r.r2adj,3)}).
        F({r.df_m},{r.df_e})={fmt(r.f,2)}, p{fmtP(r.p_f)}. Residual SE={fmt(r.rmse,4)}.
      </div>
      <SigLegend/>
    </div>
  );
  if(r._type==='mw')return(
    <div className="fade-in">
      <h2 style={{fontFamily:"'Crimson Pro',serif",fontSize:22,fontWeight:600,marginBottom:16}}>Mann-Whitney U Test</h2>
      <div style={{display:'grid',gridTemplateColumns:g3(3),gap:12,marginBottom:20}}>
        {[['U statistic',r.U],['z score',fmt(r.z,3)],['p-value (2-tail)',fmtP(r.p)],['n₁',r.nx],['n₂',r.ny],['U₁',r.U1]].map(([l,v])=><StatCard key={l} label={l} value={String(v)}/>)}
      </div>
      <SigBadge p={r.p}/><SigLegend/>
    </div>
  );
  if(r._type==='chisq')return(
    <div className="fade-in">
      <h2 style={{fontFamily:"'Crimson Pro',serif",fontSize:22,fontWeight:600,marginBottom:16}}>Chi-Square Test of Independence</h2>
      <div style={{display:'grid',gridTemplateColumns:g3(4),gap:12,marginBottom:20}}>
        {[['χ² statistic',fmt(r.chi2,3)],['df',r.df],['p-value',fmtP(r.p)],["Cramér's V",fmt(r.cramersV,3)]].map(([l,v])=><StatCard key={l} label={l} value={String(v)}/>)}
      </div>
      <div style={{marginBottom:8,display:'flex',gap:8}}><SigBadge p={r.p}/></div>
      <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>Observed Counts (Expected)</div>
      <table className="result-table">
        <thead><tr><th></th>{r.v2.map(v=><th key={v}>{v}</th>)}</tr></thead>
        <tbody>{r.v1.map((v1,i)=><tr key={v1}><td style={{fontWeight:600}}>{v1}</td>{r.obs[i].map((o,j)=><td key={j}>{o} <span style={{color:'var(--text-muted)',fontSize:10}}>({fmt(r.exp[i][j],1)})</span></td>)}</tr>)}</tbody>
      </table>
      <SigLegend/>
    </div>
  );
  if(r._type==='wilcoxon_sr')return(
    <div>
      <h2 style={{fontFamily:"'Crimson Pro',serif",fontSize:22,fontWeight:600,marginBottom:16}}>Wilcoxon Signed-Rank Test</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
        {[['W statistic',r.W],['z score',fmt(r.z,3)],['p-value (2-tail)',fmtP(r.p)],['W+',r.Wplus],['W−',r.Wminus],['n (non-zero diffs)',r.n]].map(([l,v])=><StatCard key={l} label={l} value={String(v)}/>)}
      </div>
      <SigBadge p={r.p}/><SigLegend/>
    </div>
  );
  if(r._type==='kruskal_wallis')return(
    <div>
      <h2 style={{fontFamily:"'Crimson Pro',serif",fontSize:22,fontWeight:600,marginBottom:6}}>Kruskal-Wallis H Test</h2>
      <div style={{marginBottom:16,display:'flex',gap:8,flexWrap:'wrap'}}>
        <span className={`pill ${sigCls(r.p)}`} style={{fontSize:12,padding:'4px 12px'}}>H({r.df}) = {fmt(r.H,3)}, p {fmtP(r.p)} {sig(r.p)}</span>
        <span className="pill pill-blue" style={{fontSize:12,padding:'4px 12px'}}>N = {r.N} · k = {r.k}</span>
      </div>
      <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>Group Summaries</div>
      <table className="result-table" style={{marginBottom:16}}>
        <thead><tr><th>Group</th><th>n</th><th>Mean</th><th>Median</th><th>SD</th><th>Mean Rank</th></tr></thead>
        <tbody>{(r.groups||[]).map(g=><tr key={g.group}><td style={{fontWeight:600}}>{g.group}</td><td>{g.n}</td><td>{fmt(g.mean)}</td><td>{fmt(g.median)}</td><td>{fmt(g.sd)}</td><td>{fmt(g.meanRank)}</td></tr>)}</tbody>
      </table>
      <SigLegend/>
    </div>
  );
  return<div style={{fontFamily:'monospace',fontSize:12,padding:16,background:'var(--paper)',borderRadius:8}}>{JSON.stringify(r,null,2)}</div>;
}

function AnalysisResult({r,test,ds,cfg}){

    <div style={{display:'flex',gap:4,marginBottom:14,paddingBottom:12,borderBottom:'1px solid var(--border)'}}>

        <button key={v} className={`tab-btn${view===v?' active':''}`} onClick={()=>setView(v)} style={{fontSize:12,padding:'5px 14px'}}>{l}</button>
      ))}
    </div>
  );
  return(
    <div className="fade-in">
      {tabUI}
      {view==='chart'
        ?<ResultChart r={r} ds={ds} cfg={cfg}/>

  );
}

/* ═══════════════════════════════════════════════════════════
   MODELS MODULE
═══════════════════════════════════════════════════════════ */
function ModelsModule({state,dispatch}){
  const[mtype,setMtype]=useState('ols');
  const[cfg,setCfg]=useState({dep:'',preds:[],grpVar:'',link:'identity',lambda:1.0});
  const[result,setResult]=useState(null);
  const[modelView,setModelView]=useState('table');
  const ds=state.datasets.find(d=>d.id===state.activeId);
  const nc=ds?numCols(ds):[];const cc=ds?catCols(ds):[];
  const upd=(k,v)=>setCfg(c=>({...c,[k]:v}));

  function fitModel(){
    if(!ds||!cfg.dep||!cfg.preds.length)return alert('Select outcome and at least one predictor.');
    try{
      if(mtype==='ols'){
        const yv=getNum(ds,cfg.dep);
        const Xm=ds.rows.map(r=>cfg.preds.map(p=>Number(r[p]))).filter((_,i)=>!isNaN(yv[i]));
        const yc=yv.filter(v=>!isNaN(v));
        const r=olsRegression(yc,Xm);
        if(r)setResult({...r,dep:cfg.dep,preds:cfg.preds,names:['(Intercept)',...cfg.preds],_type:'model_ols'});
        else alert('Matrix is singular. Check for collinear predictors.');
      }else if(mtype==='logistic'){
        const vals=getVal(ds,cfg.dep);
        const uniq=[...new Set(vals.filter(v=>v!==null&&v!==''))];
        if(uniq.length!==2)return alert('Logistic regression requires exactly 2 unique outcome values (binary).');
        const yv=vals.map(v=>v===uniq[1]?1:v===uniq[0]?0:NaN);
        const Xm=ds.rows.map(r=>cfg.preds.map(p=>Number(r[p]))).filter((_,i)=>!isNaN(yv[i]));
        const yc=yv.filter(v=>!isNaN(v));
        const r=logisticReg(yc,Xm);
        setResult({...r,dep:cfg.dep,preds:cfg.preds,names:['(Intercept)',...cfg.preds],levels:uniq,_type:'model_logistic'});
      }else if(mtype==='poisson'){
        const yv=getNum(ds,cfg.dep);
        const Xm=ds.rows.map(r=>cfg.preds.map(p=>Number(r[p]))).filter((_,i)=>!isNaN(yv[i]));
        const yc=yv.filter(v=>!isNaN(v));
        const r=poissonReg(yc,Xm);
        setResult({...r,dep:cfg.dep,preds:cfg.preds,names:['(Intercept)',...cfg.preds],_type:'model_poisson'});
      }else if(mtype==='ridge'){
        const yv=getNum(ds,cfg.dep);
        const Xm=ds.rows.map(r=>cfg.preds.map(p=>Number(r[p]))).filter((_,i)=>!isNaN(yv[i]));
        const yc=yv.filter(v=>!isNaN(v));
        const r=ridgeRegression(yc,Xm,Number(cfg.lambda)||1.0);
        if(r)setResult({...r,dep:cfg.dep,preds:cfg.preds,names:['(Intercept)',...cfg.preds],_type:'model_ridge'});
        else alert('Matrix is singular. Check predictors.');
      }else if(mtype==='negbinom'){
        const yv=getNum(ds,cfg.dep);
        const Xm=ds.rows.map(r=>cfg.preds.map(p=>Number(r[p]))).filter((_,i)=>!isNaN(yv[i]));
        const yc=yv.filter(v=>!isNaN(v));
        const r=negativeBinomialReg(yc,Xm);
        if(r)setResult({...r,dep:cfg.dep,preds:cfg.preds,names:['(Intercept)',...cfg.preds],_type:'model_negbinom'});
        else alert('Negative Binomial fit failed. Check that outcome contains non-negative integers.');
      }
    }catch(e){alert('Model error: '+e.message+'. Check your data for issues.');}
  }

  if(!ds)return(<div style={{display:'flex',flexDirection:'column',height:'100%'}}><div className="module-header"><div className="module-title">Model Builder</div></div><div className="empty-state"><div style={{fontSize:48,opacity:0.18}}>⬡</div><p style={{color:'var(--text-muted)'}}>Load a dataset first.</p></div></div>);

  const MODEL_TYPES=[
    {id:'ols',l:'Linear Regression',sub:'Continuous outcome · OLS',avail:true},
    {id:'ridge',l:'Ridge Regression',sub:'L2-regularized · shrinks coefficients',avail:true},
    {id:'logistic',l:'Logistic Regression',sub:'Binary outcome · log-odds',avail:true},
    {id:'poisson',l:'Poisson GLM',sub:'Count outcome · log-link',avail:true},
    {id:'negbinom',l:'Negative Binomial',sub:'Overdispersed counts · log-link',avail:true},
    {id:'lmm',l:'Linear Mixed Model',sub:'Random intercepts/slopes',avail:false},
    {id:'glmm',l:'Generalized LMM',sub:'Mixed effects + link fn',avail:false},
  ];

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div className="module-header"><div className="module-title">Model Builder</div><div className="module-subtitle">Regression, GLM, and hierarchical model framework</div></div>
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        {/* Model type selector */}
        <div style={{width:220,borderRight:'1px solid var(--border)',overflowY:'auto',background:'var(--paper)',padding:'12px 0',flexShrink:0}}>
          <div className="section-head">Model Family</div>
          {MODEL_TYPES.map(m=>(
            <div key={m.id} onClick={()=>m.avail&&setMtype(m.id)} style={{padding:'10px 14px',borderRadius:6,cursor:m.avail?'pointer':'not-allowed',background:mtype===m.id?'rgba(200,144,62,0.1)':'transparent',borderLeft:`2.5px solid ${mtype===m.id?'var(--gold)':'transparent'}`,opacity:m.avail?1:0.42,margin:'1px 8px',transition:'all 0.1s'}}>
              <div style={{fontSize:12,fontWeight:500}}>{m.l}</div>
              <div style={{fontSize:11,color:'var(--text-muted)'}}>{m.sub}{!m.avail?<span style={{color:'var(--blue)'}}> · planned</span>:''}</div>
            </div>
          ))}
          <div style={{margin:'16px 12px 0',padding:'12px',background:'rgba(74,127,168,0.08)',borderRadius:8,fontSize:11,color:'var(--blue)',lineHeight:1.6}}>
            <strong>LMM Extension Point</strong><br/>
            The UI architecture for mixed effects is built: grouping var selection, formula preview, and random-effects configuration are all wired. Backend solver (e.g., lme4-JS REML) is the next expansion module.
          </div>
        </div>
        {/* Config */}
        <div className="side-panel" style={{width:280,background:'white',borderRight:'1px solid var(--border)'}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:14}}>Model Specification</div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>Outcome Variable (Y)</label>
            <select className="select-field" value={cfg.dep} onChange={e=>upd('dep',e.target.value)} style={{width:'100%',fontSize:12}}>
              <option value="">Select…</option>{nc.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em',display:'block',marginBottom:6}}>Predictors — click to add/remove</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:6}}>
              {(mtype==='ols'?nc:ds.columns).filter(c=>c!==cfg.dep&&!(cfg.preds||[]).includes(c)).map(c=>(
                <div key={c} className={`var-chip ${ds.types[c]==='numeric'?'num':'cat'}`} onClick={()=>upd('preds',[...(cfg.preds||[]),c])} style={{cursor:'pointer'}} title="Click to add">
                  <span className="var-badge">{ds.types[c]==='numeric'?'#':'T'}</span>{c}<span style={{marginLeft:4,opacity:0.4,fontSize:11}}>+</span>
                </div>
              ))}
            </div>
            {(cfg.preds||[]).length>0&&(
              <div style={{display:'flex',flexWrap:'wrap',gap:5,padding:'8px',background:'rgba(74,127,168,0.06)',borderRadius:7,border:'1px solid rgba(74,127,168,0.15)'}}>
                {(cfg.preds||[]).map(c=>(
                  <div key={c} className={`var-chip ${ds.types[c]==='numeric'?'num':'cat'} pop-in`}>
                    <span className="var-badge">{ds.types[c]==='numeric'?'#':'T'}</span>{c}
                    <span onClick={()=>upd('preds',(cfg.preds||[]).filter(x=>x!==c))} style={{marginLeft:5,cursor:'pointer',opacity:0.4,fontSize:13}}>×</span>
                  </div>
                ))}
              </div>
            )}
          </div>
          {(mtype==='lmm'||mtype==='glmm')&&(
            <div style={{marginBottom:12}}>
              <label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>Grouping Variable (Random Effects)</label>
              <select className="select-field" value={cfg.grpVar} onChange={e=>upd('grpVar',e.target.value)} style={{width:'100%',fontSize:12}}>
                <option value="">Select…</option>{[...cc,...nc].map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
          )}
          {cfg.dep&&cfg.preds.length>0&&(
            <div style={{padding:'10px 12px',background:'var(--paper)',borderRadius:7,fontSize:12,fontFamily:'monospace',marginBottom:12,lineHeight:1.7,color:'var(--blue)'}}>
              {cfg.dep} ~{cfg.preds.length?' '+cfg.preds.join(' + '):' (no predictors)'}
              {(mtype==='lmm'||mtype==='glmm')&&cfg.grpVar?` + (1 | ${cfg.grpVar})`:''}
            </div>
          )}
          {mtype==='ridge'&&(
            <div style={{marginBottom:12}}>
              <label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>λ Regularization Strength</label>
              <input className="input-field" type="number" min="0" step="0.1" value={cfg.lambda??1.0} onChange={e=>upd('lambda',parseFloat(e.target.value)||1.0)} style={{width:'100%',fontSize:12}}/>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>Higher λ shrinks coefficients more aggressively. Try 0.1–10.</div>
            </div>
          )}
          <button className="btn btn-gold" onClick={fitModel} style={{width:'100%'}}>Fit Model</button>
        </div>
        {/* Results */}
        <div className="results-panel">
          {result?(
            <div className="fade-in">
              <div style={{display:'flex',gap:4,marginBottom:14,paddingBottom:12,borderBottom:'1px solid var(--border)'}}>
                {[['table','📋 Results'],['chart','📊 Chart']].map(([v,l])=>(
                  <button key={v} className={`tab-btn${modelView===v?' active':''}`} onClick={()=>setModelView(v)} style={{fontSize:12,padding:'5px 14px'}}>{l}</button>
                ))}
              </div>
              {modelView==='chart'
                ?<ResultChart r={result} ds={ds} cfg={cfg}/>
                :(
                  <>
                    {result._type==='model_ols'&&(
                      <>
                        <h2 style={{fontFamily:"'Crimson Pro',serif",fontSize:22,fontWeight:600,marginBottom:4}}>Linear Regression (OLS)</h2>
                        <div className="model-formula">{result.dep} ~ {result.preds.join(' + ')}</div>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
                          {[['R²',fmt(result.r2,4)],['Adj. R²',fmt(result.r2adj,4)],['F stat',fmt(result.f,3)],['RMSE',fmt(result.rmse,4)]].map(([l,v])=><StatCard key={l} label={l} value={v}/>)}
                        </div>
                        <table className="result-table" style={{marginBottom:12}}><thead><tr><th>Term</th><th>β</th><th>SE</th><th>t</th><th>p</th><th>95% CI</th></tr></thead>
                        <tbody>{result.names.map((name,i)=>(
                          <tr key={name} className="coef-row">
                            <td style={{fontWeight:600}}>{name}</td><td>{fmt(result.beta[i])}</td><td>{fmt(result.se_b[i])}</td><td>{fmt(result.t_v[i],3)}</td>
                            <td><SigBadge p={result.p_v[i]}/></td><td style={{fontFamily:'monospace',fontSize:11}}>[{fmt(result.ci_lo[i],3)}, {fmt(result.ci_hi[i],3)}]</td>
                          </tr>
                        ))}</tbody></table>
                        <div className="result-summary"><p style={{fontSize:13,lineHeight:1.7}}>The model explains <strong>{(result.r2*100).toFixed(1)}%</strong> of variance (R² = {fmt(result.r2,3)}, Adj. R² = {fmt(result.r2adj,3)}). F({result.df_m},{result.df_e}) = {fmt(result.f,2)}, p {fmtP(result.p_f)}.</p></div>
                      </>
                    )}
                    {result._type==='model_ridge'&&(
                      <>
                        <h2 style={{fontFamily:"'Crimson Pro',serif",fontSize:22,fontWeight:600,marginBottom:4}}>Ridge Regression (L2)</h2>
                        <div className="model-formula">{result.dep} ~ {result.preds.join(' + ')} &nbsp;·&nbsp; λ = {result.lambda}</div>
                        <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:14,padding:'8px 12px',background:'rgba(245,158,11,0.07)',borderRadius:7,border:'1px solid rgba(245,158,11,0.15)'}}>
                          Ridge shrinks coefficients toward zero, reducing overfitting. R² is on training data; p-values are approximate (OLS SEs with ridge β).
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
                          {[['R²',fmt(result.r2,4)],['λ',String(result.lambda)],['RMSE',fmt(result.rmse,4)],['n',String(result.n)]].map(([l,v])=><StatCard key={l} label={l} value={v}/>)}
                        </div>
                        <table className="result-table" style={{marginBottom:12}}><thead><tr><th>Term</th><th>β (shrunk)</th><th>SE</th><th>t</th><th>p (approx)</th><th>95% CI</th></tr></thead>
                        <tbody>{result.names.map((name,i)=>(
                          <tr key={name} className="coef-row">
                            <td style={{fontWeight:600}}>{name}</td><td>{fmt(result.beta[i])}</td><td>{fmt(result.se_b[i])}</td><td>{fmt(result.t_v[i],3)}</td>
                            <td><SigBadge p={result.p_v[i]}/></td><td style={{fontFamily:'monospace',fontSize:11}}>[{fmt(result.ci_lo[i],3)}, {fmt(result.ci_hi[i],3)}]</td>
                          </tr>
                        ))}</tbody></table>
                      </>
                    )}
                    {result._type==='model_logistic'&&(
                      <>
                        <h2 style={{fontFamily:"'Crimson Pro',serif",fontSize:22,fontWeight:600,marginBottom:4}}>Logistic Regression</h2>
                        <div className="model-formula">{result.dep} (ref: {result.levels?.[0]} → 1 = {result.levels?.[1]}) ~ {result.preds.join(' + ')}</div>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
                          {[["McFadden R²",fmt(result.mcfR2,4)],['Accuracy',(result.accuracy*100).toFixed(1)+'%'],['AIC',fmt(result.aic,1)],['Log-Lik',fmt(result.ll,2)]].map(([l,v])=><StatCard key={l} label={l} value={v}/>)}
                        </div>
                        <table className="result-table" style={{marginBottom:12}}><thead><tr><th>Term</th><th>β (log-odds)</th><th>SE</th><th>z</th><th>p</th><th>OR (95% CI)</th></tr></thead>
                        <tbody>{result.names.map((name,i)=>(
                          <tr key={name} className="coef-row">
                            <td style={{fontWeight:600}}>{name}</td><td>{fmt(result.beta[i])}</td><td>{fmt(result.se[i])}</td><td>{fmt(result.z_v[i],3)}</td>
                            <td><SigBadge p={result.p_v[i]}/></td>
                            <td style={{fontFamily:'monospace',fontSize:11}}>{fmt(result.or[i],3)} [{fmt(Math.exp(result.ci_lo[i]),3)}, {fmt(Math.exp(result.ci_hi[i]),3)}]</td>
                          </tr>
                        ))}</tbody></table>
                        <div className="result-summary"><p style={{fontSize:13,lineHeight:1.7}}>Odds ratios &gt; 1 indicate increased odds of <strong>{result.levels?.[1]}</strong>. McFadden R² = {fmt(result.mcfR2,3)} ({result.mcfR2>0.2?'good':'modest'} fit). Accuracy = {(result.accuracy*100).toFixed(1)}%.</p></div>
                      </>
                    )}
                    {result._type==='model_poisson'&&(
                      <>
                        <h2 style={{fontFamily:"'Crimson Pro',serif",fontSize:22,fontWeight:600,marginBottom:4}}>Poisson GLM (log-link)</h2>
                        <div className="model-formula">log({result.dep}) ~ {result.preds.join(' + ')}</div>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
                          {[['Deviance',fmt(result.deviance,2)],['AIC',fmt(result.aic,1)],['Log-Lik',fmt(result.ll,2)],['n',String(result.n)]].map(([l,v])=><StatCard key={l} label={l} value={v}/>)}
                        </div>
                        <table className="result-table" style={{marginBottom:12}}><thead><tr><th>Term</th><th>β (log-rate)</th><th>SE</th><th>z</th><th>p</th><th>IRR (95% CI)</th></tr></thead>
                        <tbody>{result.names.map((name,i)=>(
                          <tr key={name} className="coef-row">
                            <td style={{fontWeight:600}}>{name}</td><td>{fmt(result.beta[i])}</td><td>{fmt(result.se[i])}</td><td>{fmt(result.z_v[i],3)}</td>
                            <td><SigBadge p={result.p_v[i]}/></td>
                            <td style={{fontFamily:'monospace',fontSize:11}}>{fmt(result.irr[i],3)} [{fmt(Math.exp(result.ci_lo[i]),3)}, {fmt(Math.exp(result.ci_hi[i]),3)}]</td>
                          </tr>
                        ))}</tbody></table>
                        <div className="result-summary"><p style={{fontSize:13,lineHeight:1.7}}>Incidence Rate Ratios (IRR) multiplicatively scale the expected count. Deviance = {fmt(result.deviance,2)}, AIC = {fmt(result.aic,1)}.</p></div>
                      </>
                    )}
                    {result._type==='model_negbinom'&&(
                      <>
                        <h2 style={{fontFamily:"'Crimson Pro',serif",fontSize:22,fontWeight:600,marginBottom:4}}>Negative Binomial GLM (log-link)</h2>
                        <div className="model-formula">log({result.dep}) ~ {result.preds.join(' + ')}</div>
                        <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:14,padding:'8px 12px',background:'rgba(74,127,168,0.07)',borderRadius:7}}>
                          θ → ∞ recovers Poisson. Smaller θ = more overdispersion. IRR = exp(β).
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
                          {[['θ (dispersion)',fmt(result.theta,3)],['AIC',fmt(result.aic,1)],['Log-Lik',fmt(result.ll,2)],['n',String(result.n)]].map(([l,v])=><StatCard key={l} label={l} value={v}/>)}
                        </div>
                        <table className="result-table" style={{marginBottom:12}}><thead><tr><th>Term</th><th>β (log-rate)</th><th>SE</th><th>z</th><th>p</th><th>IRR (95% CI)</th></tr></thead>
                        <tbody>{result.names.map((name,i)=>(
                          <tr key={name} className="coef-row">
                            <td style={{fontWeight:600}}>{name}</td><td>{fmt(result.beta[i])}</td><td>{fmt(result.se[i])}</td><td>{fmt(result.z_v[i],3)}</td>
                            <td><SigBadge p={result.p_v[i]}/></td>
                            <td style={{fontFamily:'monospace',fontSize:11}}>{fmt(result.irr[i],3)} [{fmt(Math.exp(result.ci_lo[i]),3)}, {fmt(Math.exp(result.ci_hi[i]),3)}]</td>
                          </tr>
                        ))}</tbody></table>
                      </>
                    )}
                    <SigLegend/>
                  </>
                )
              }
            </div>
          ):(
            <div className="empty-state">
              <div style={{fontSize:48,opacity:0.15}}>⬡</div>
              <p style={{color:'var(--text-muted)',fontSize:13,maxWidth:340,lineHeight:1.6}}>Specify an outcome and predictors, then click "Fit Model".</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   REPORT MODULE
═══════════════════════════════════════════════════════════ */
function ReportModule({state}){
  const[title,setTitle]=useState(state.projectName||'Statistical Report');
  const[sects,setSects]=useState({intro:true,data:true,analyses:true,methods:true});
  const[gen,setGen]=useState(null);

  const ds=state.datasets.find(d=>d.id===state.activeId);

  function generate(){
    const analyses=state.analyses.slice(0,20);
    let html=`<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>${title}</title><style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,serif;max-width:900px;margin:0 auto;padding:44px 28px;color:#1A1D23;background:#FAFAF7;line-height:1.75;}
h1{font-size:30px;font-weight:600;color:#0D1B2A;margin-bottom:6px;letter-spacing:-0.02em;}
h2{font-size:20px;font-weight:600;color:#0D1B2A;margin:36px 0 12px;padding-bottom:7px;border-bottom:2px solid #E8E6E1;}
h3{font-size:16px;font-weight:600;margin:24px 0 8px;color:#374151;}
p{margin-bottom:12px;}
.meta{font-family:monospace;font-size:12px;color:#6B7280;margin-bottom:28px;}
table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px;}
th{background:#0D1B2A;color:white;padding:8px 12px;text-align:left;font-family:Georgia;font-size:12px;}
td{padding:7px 12px;border-bottom:1px solid #E8E6E1;font-family:Courier New,monospace;}
tr:nth-child(even) td{background:#F5F4F0;}
.note{background:#EFF6FF;border-left:3px solid #3B82F6;padding:12px 16px;margin:20px 0;font-size:13px;border-radius:0 6px 6px 0;}
.sig{background:#FEE2E2;color:#991B1B;padding:1px 7px;border-radius:20px;font-size:11px;font-family:monospace;}
.notsig{background:#F3F4F6;color:#6B7280;padding:1px 7px;border-radius:20px;font-size:11px;font-family:monospace;}
.result-block{background:white;border:1px solid #E8E6E1;border-radius:8px;padding:16px;margin:16px 0;}
footer{margin-top:56px;padding-top:16px;border-top:1px solid #E8E6E1;font-size:11px;color:#9CA3AF;}
@media print{body{max-width:100%;}}
</style></head><body>
<h1>${title}</h1>
<div class="meta">Generated by StatLab Pro &middot; ${new Date().toLocaleString()} &middot; Local-first browser-based analysis</div>`;

    if(sects.intro){
      html+=`<h2>Introduction</h2><p>This report summarizes statistical analyses performed using StatLab Pro, a local-first browser-based statistical computing environment. All computations were conducted in-browser using exact numerical algorithms.</p>`;
    }
    if(sects.data&&ds){
      html+=`<h2>Data Description</h2><p>Dataset: <strong>${ds.name}</strong> &mdash; ${ds.rows.length} observations, ${ds.columns.length} variables.</p>
<table><thead><tr><th>Variable</th><th>Type</th><th>n</th><th>Mean / Top Level</th><th>SD / N Unique</th></tr></thead><tbody>`;
      ds.columns.forEach(col=>{
        if(ds.types[col]==='numeric'){const v=getNum(ds,col);const s=describe(v);html+=`<tr><td>${col}</td><td>Numeric</td><td>${s.n}</td><td>${fmt(s.mean,3)}</td><td>${fmt(s.sd,3)}</td></tr>`;}
        else{const vals=getVal(ds,col);const freq={};vals.forEach(v=>{freq[v]=(freq[v]||0)+1;});const top=Object.entries(freq).sort((a,b)=>b[1]-a[1])[0];html+=`<tr><td>${col}</td><td>Text</td><td>${vals.filter(v=>v!='').length}</td><td>${top?top[0]:'—'}</td><td>${Object.keys(freq).length} levels</td></tr>`;}
      });
      html+=`</tbody></table>`;
    }
    if(sects.analyses&&analyses.length>0){
      html+=`<h2>Statistical Results</h2>`;
      analyses.forEach((a,i)=>{
        const r=a.result;const label=TESTS.find(t=>t.id===a.test)?.l||a.test;
        html+=`<div class="result-block"><h3>${i+1}. ${label}</h3>`;
        if(r._type==='descriptive'&&r.stats){
          html+=`<table><thead><tr><th>Variable</th><th>n</th><th>Mean</th><th>SD</th><th>Median</th><th>Min</th><th>Max</th></tr></thead><tbody>`;
          r.stats.forEach(s=>{html+=`<tr><td>${s.col}</td><td>${s.n}</td><td>${fmt(s.mean,3)}</td><td>${fmt(s.sd,3)}</td><td>${fmt(s.median,3)}</td><td>${fmt(s.min,3)}</td><td>${fmt(s.max,3)}</td></tr>`;});
          html+=`</tbody></table>`;
        }else if(r.t!==undefined){html+=`<p>t(${fmt(r.df,1)}) = ${fmt(r.t,3)}, p ${fmtP(r.p)} <span class="${r.p<0.05?'sig':'notsig'}">${r.p<0.05?'significant':'n.s.'}</span>. 95% CI: [${fmt(r.ci_lo,3)}, ${fmt(r.ci_hi,3)}]. Cohen's d = ${fmt(r.d,3)}.</p>`;}
        else if(r.F!==undefined){html+=`<p>F(${r.dfb},${r.dfw}) = ${fmt(r.F,3)}, p ${fmtP(r.p)} <span class="${r.p<0.05?'sig':'notsig'}">${r.p<0.05?'significant':'n.s.'}</span>. &eta;&sup2; = ${fmt(r.eta2,3)}.</p>`;}
        else if(r.r2!==undefined){html+=`<p>R&sup2; = ${fmt(r.r2,4)} (Adj. R&sup2; = ${fmt(r.r2adj,4)}). F(${r.df_m},${r.df_e}) = ${fmt(r.f,3)}, p ${fmtP(r.p_f)}. RMSE = ${fmt(r.rmse,4)}.</p>`;}
        else if(r.chi2!==undefined){html+=`<p>&chi;&sup2;(${r.df}) = ${fmt(r.chi2,3)}, p ${fmtP(r.p)} <span class="${r.p<0.05?'sig':'notsig'}">${r.p<0.05?'significant':'n.s.'}</span>. Cram&eacute;r's V = ${fmt(r.cramersV,3)}.</p>`;}
        html+=`</div>`;
      });
    }
    if(sects.methods){
      html+=`<h2>Methods</h2><div class="note"><p><strong>Statistical Computing:</strong> All analyses were performed using StatLab Pro (v1.0), a browser-based statistical computing environment built with React and JavaScript. Statistical distributions (t, F, &chi;&sup2;, normal) are computed using exact numerical algorithms including the regularized incomplete beta and gamma functions.</p><p><strong>Significance thresholds:</strong> Results are considered statistically significant at &alpha; = .05. Confidence intervals are constructed at the 95% level unless specified. Effect sizes are reported where applicable: Cohen's d for t-tests, &eta;&sup2; for ANOVA, and R&sup2; for regression.</p><p><strong>Reproducibility:</strong> This analysis was conducted locally. No data was transmitted externally. To regenerate this report, reopen the project in StatLab Pro.</p></div>`;
    }
    html+=`<footer>StatLab Pro &middot; Local-first statistical analysis &middot; All computations performed in-browser &middot; ${new Date().getFullYear()}</footer></body></html>`;
    setGen(html);
  }

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div className="module-header"><div className="module-title">Report &amp; Export</div><div className="module-subtitle">Generate publication-ready outputs</div></div>
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        <div className="side-panel" style={{width:272,background:'var(--paper)'}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:14}}>Report Settings</div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>Title</label>
            <input className="input-field" value={title} onChange={e=>setTitle(e.target.value)} style={{width:'100%',fontSize:12}}/>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontWeight:600,fontSize:12,marginBottom:8}}>Sections</div>
            {[['intro','Introduction'],['data',`Data Description${ds?` (${ds.name})`:''}`],['analyses',`Analyses (${state.analyses.length})`],['methods','Methods & Notes']].map(([k,l])=>(
              <label key={k} className="check-row" style={{padding:'5px 0'}}>
                <input type="checkbox" checked={sects[k]} onChange={e=>setSects(s=>({...s,[k]:e.target.checked}))}/>
                <span style={{fontSize:12}}>{l}</span>
              </label>
            ))}
          </div>
          <button className="btn btn-gold" onClick={generate} style={{width:'100%',marginBottom:10}}>Generate Report</button>
          {gen&&(
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <button className="btn btn-primary btn-sm" onClick={()=>{const b=new Blob([gen],{type:'text/html'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=(title.replace(/\s+/g,'_')||'report')+'.html';a.click();URL.revokeObjectURL(u);}}>⬇ Download HTML</button>
              <button className="btn btn-secondary btn-sm" onClick={()=>{const u=URL.createObjectURL(new Blob([gen],{type:'text/html'}));window.open(u,'_blank');}}>Open in New Tab</button>
            </div>
          )}
          <div style={{marginTop:24,paddingTop:16,borderTop:'1px solid var(--border)'}}>
            <div style={{fontWeight:600,fontSize:12,marginBottom:10}}>Export Datasets</div>
            {state.datasets.length===0&&<div style={{fontSize:12,color:'var(--text-muted)'}}>No datasets loaded.</div>}
            {state.datasets.map(d=>(
              <div key={d.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid var(--border)',fontSize:12}}>
                <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginRight:8}}>{d.name}</span>
                <div style={{display:'flex',gap:4,flexShrink:0}}>
                  <button className="btn btn-secondary btn-xs" onClick={()=>dlCSV(d.rows,d.name+'.csv')}>CSV</button>
                  <button className="btn btn-secondary btn-xs" onClick={()=>dlJSON(d.rows,d.name+'.json')}>JSON</button>
                </div>
              </div>
            ))}
          </div>
          {state.analyses.length>0&&(
            <div style={{marginTop:16}}>
              <div style={{fontWeight:600,fontSize:12,marginBottom:6}}>Export Analyses</div>
              <button className="btn btn-secondary btn-sm" style={{width:'100%'}} onClick={()=>dlJSON(state.analyses,'analyses.json')}>Download All Analyses JSON</button>
            </div>
          )}
        </div>
        <div style={{flex:1,overflowY:'auto',padding:24}}>
          {gen?(
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                <h3 style={{fontFamily:"'Crimson Pro',serif",fontSize:18,fontWeight:600}}>Report Preview</h3>
                <span style={{fontSize:12,color:'var(--text-muted)'}}>{(gen.length/1024).toFixed(1)} KB</span>
              </div>
              <div style={{border:'1px solid var(--border)',borderRadius:10,overflow:'hidden',boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}}>
                <iframe srcDoc={gen} style={{width:'100%',height:'72vh',border:'none'}} title="Report Preview"/>
              </div>
            </div>
          ):(
            <div className="empty-state">
              <div style={{fontSize:52,marginBottom:14,opacity:0.15}}>◧</div>
              <h3 style={{fontFamily:"'Crimson Pro',serif",fontSize:20,marginBottom:8}}>No Report Generated</h3>
              <p style={{color:'var(--text-muted)',fontSize:13,maxWidth:380,lineHeight:1.7}}>Configure your report settings and click "Generate Report" to create a publication-ready HTML document with all your analyses.</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   TUTORIAL MODULE
═══════════════════════════════════════════════════════════ */
const TUTORIAL_STEPS=[
  {id:'load',title:'Load a Dataset',icon:'📂',color:'#3B82F6',
    desc:'StatLab Pro works locally — no data leaves your browser. Start by loading the built-in Iris dataset to follow along.',
    action:'Load Iris Dataset',detail:'The Iris dataset has 150 rows and 5 columns: 4 numeric measurements (sepal & petal dimensions) and one categorical species label — perfect for demonstrating multiple analysis types.'},
  {id:'inspect',title:'Inspect Your Variables',icon:'🔍',color:'#8B5CF6',
    desc:'Visit the Data Explorer and click any column header. A statistics panel slides in on the right showing mean, SD, quartiles, and distribution bars for that variable.',
    action:'Go to Data Explorer',detail:'The Column Inspector auto-detects numeric vs. text columns and shows appropriate summaries. Numeric columns get descriptive stats; text columns get frequency tables.'},
  {id:'visualize',title:'Build a Scatter Plot',icon:'📊',color:'#22C55E',
    desc:'In the Visualization Studio, drag petal_length to the X Axis slot and petal_width to Y Axis. Drag species to Color / Group. Hit Render.',
    action:'Go to Visualization',detail:'The chart uses Plotly.js and is fully interactive — zoom, pan, hover for values. Export to PNG or SVG for papers and presentations.'},
  {id:'ttest',title:'Run a t-Test',icon:'⚖',color:'#C8903E',
    desc:'In the Analysis Lab, click "Compare Groups" then "Welch\'s t-Test". Drag sepal_length to Outcome and species to Group. Select setosa vs. versicolor.',
    action:'Go to Analysis Lab',detail:'StatLab uses Welch\'s t-test by default (robust to unequal variances). Results include Cohen\'s d, 95% CI on the difference, and a full significance table.'},
  {id:'anova',title:'One-Way ANOVA',icon:'∑',color:'#EF4444',
    desc:'Still in Analysis Lab → Compare Groups → One-Way ANOVA. Set sepal_length as the outcome and species as the group. Run it to see the full ANOVA table and Tukey HSD.',
    action:'Go to Analysis Lab',detail:'ANOVA tests whether any group means differ. The post-hoc Tukey HSD compares all pairs. Effect size η² tells you practical significance.'},
  {id:'regression',title:'Fit a Regression Model',icon:'⌁',color:'#0891B2',
    desc:'Open the Model Builder. Select petal_length as the outcome. Click petal_width and sepal_length as predictors. Fit the OLS model.',
    action:'Go to Model Builder',detail:'The OLS model reports R², adjusted R², standardized β coefficients, t-statistics, and 95% CIs for each predictor. The model formula appears in the config panel as you build it.'},
  {id:'report',title:'Export a Report',icon:'📄',color:'#6B7280',
    desc:'Finally, open Report & Export. Your analyses accumulate automatically. Toggle the sections you want, give the report a title, and click Generate Report.',
    action:'Go to Report',detail:'Reports are self-contained HTML files — open in any browser, share by email, or print to PDF. All results and tables are included with proper statistical notation.'},
];

function TutorialModule({state,dispatch}){
  const[active,setActive]=useState(0);
  const[completed,setCompleted]=useState(new Set());
  const step=TUTORIAL_STEPS[active];
  const progress=(completed.size/TUTORIAL_STEPS.length)*100;

  const MODULE_MAP={load:'data',inspect:'data',visualize:'visualize',ttest:'analyze',anova:'analyze',regression:'models',report:'report'};

  function markAndGo(){
    setCompleted(s=>new Set([...s,step.id]));
    // Auto-load iris if needed
    if(step.id==='load'&&!state.datasets.find(d=>d.name==='Iris Dataset')){
      const s=SAMPLES.iris;
      dispatch({type:'ADD_DS',ds:{id:'ds_'+Date.now(),name:s.name,columns:s.cols,rows:s.rows,types:s.types,createdAt:Date.now()}});
    }
    dispatch({type:'SET_MODULE',m:MODULE_MAP[step.id]||'data'});
  }

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflowY:'auto'}}>
      <div className="module-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div className="module-title">Interactive Tutorial</div>
          <div className="module-subtitle">A guided walkthrough of a complete analysis workflow</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:12,color:'var(--text-muted)'}}>{completed.size}/{TUTORIAL_STEPS.length} completed</span>
          <div className="progress-bar" style={{width:120}}><div className="progress-fill" style={{width:`${progress}%`}}/></div>
        </div>
      </div>
      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        {/* Step nav */}
        <div style={{width:210,borderRight:'1px solid var(--border)',overflowY:'auto',background:'var(--paper)',padding:'12px 0',flexShrink:0}}>
          {TUTORIAL_STEPS.map((s,i)=>(
            <div key={s.id} onClick={()=>setActive(i)} style={{margin:'2px 8px',padding:'10px 12px',borderRadius:8,cursor:'pointer',background:active===i?'white':'transparent',border:`1px solid ${active===i?'var(--border)':'transparent'}`,boxShadow:active===i?'0 1px 4px rgba(0,0,0,0.06)':'none',transition:'all 0.15s'}}>
              <div style={{display:'flex',alignItems:'center',gap:9}}>
                <div style={{width:28,height:28,borderRadius:7,background:completed.has(s.id)?'rgba(34,197,94,0.12)':active===i?s.color+'1A':'var(--paper-dark)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0,border:`1px solid ${completed.has(s.id)?'rgba(34,197,94,0.25)':'transparent'}`}}>
                  {completed.has(s.id)?'✓':s.icon}
                </div>
                <div>
                  <div style={{fontSize:12,fontWeight:active===i?600:500,color:active===i?'var(--text)':'var(--text-muted)',lineHeight:1.3}}>{s.title}</div>
                  <div style={{fontSize:10,color:'var(--text-light)',marginTop:1}}>Step {i+1}</div>
                </div>
              </div>
            </div>
          ))}
          <div style={{margin:'20px 12px',padding:'12px',background:'white',border:'1px solid var(--border)',borderRadius:9}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text)',marginBottom:6}}>Workflow covered</div>
            {['Import data','Inspect variables','Visualize distributions','Hypothesis testing','Regression modeling','Export & report'].map(f=>(
              <div key={f} style={{fontSize:11,color:'var(--text-muted)',display:'flex',gap:6,marginBottom:4}}>
                <span style={{color:'var(--gold)',fontWeight:700}}>→</span>{f}
              </div>
            ))}
          </div>
        </div>
        {/* Step content */}
        <div style={{flex:1,overflowY:'auto',padding:'36px 40px',maxWidth:780}}>
          <div key={active} className="module-enter">
            <div style={{display:'flex',align:'center',gap:10,marginBottom:6}}>
              <span className="demo-badge">Step {active+1} of {TUTORIAL_STEPS.length}</span>
              {completed.has(step.id)&&<span className="demo-badge" style={{background:'rgba(34,197,94,0.1)',color:'#16A34A',borderColor:'rgba(34,197,94,0.2)'}}>✓ Completed</span>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:16,marginTop:12}}>
              <div style={{width:52,height:52,borderRadius:14,background:step.color+'18',border:`1px solid ${step.color}30`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,flexShrink:0}}>{step.icon}</div>
              <h2 style={{fontFamily:"'Crimson Pro',serif",fontSize:28,fontWeight:600,color:'var(--text)',letterSpacing:'-0.02em',lineHeight:1.2}}>{step.title}</h2>
            </div>
            <p style={{fontSize:15,lineHeight:1.85,color:'var(--text)',marginBottom:20}}>{step.desc}</p>
            <div style={{background:'white',border:'1px solid var(--border)',borderRadius:10,padding:'16px 20px',marginBottom:24}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>💡 Detail</div>
              <p style={{fontSize:13,lineHeight:1.75,color:'var(--text-muted)'}}>{step.detail}</p>
            </div>
            <div style={{display:'flex',gap:12,alignItems:'center'}}>
              <button className="btn btn-gold" onClick={markAndGo} style={{fontSize:14,padding:'10px 22px'}}>
                {step.action} →
              </button>
              {active>0&&<button className="btn btn-secondary" onClick={()=>setActive(a=>a-1)} style={{fontSize:13}}>← Previous</button>}
              {active<TUTORIAL_STEPS.length-1&&<button className="btn btn-secondary" onClick={()=>setActive(a=>a+1)} style={{fontSize:13}}>Skip →</button>}
            </div>
            {/* Progress mini-map */}
            <div style={{marginTop:40,display:'flex',gap:6}}>
              {TUTORIAL_STEPS.map((s,i)=>(
                <div key={s.id} onClick={()=>setActive(i)} style={{height:4,flex:1,borderRadius:3,background:completed.has(s.id)?'var(--gold)':i===active?'var(--blue)':'var(--border)',cursor:'pointer',transition:'background 0.2s'}} title={s.title}/>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════ */
function App(){
  const[state,dispatch]=useReducer(reducer,initialState);
  const saveTimer=useRef(null);

  // Autosave to IndexedDB with debounce
  useEffect(()=>{
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      try{
        const payload={
          id:state.projectId,name:state.projectName,
          datasets:state.datasets.map(d=>({...d,rows:d.rows?.slice(0,8000)})),
          analyses:state.analyses.slice(0,100),
          charts:state.charts,
          savedAt:Date.now()
        };
        await dbSave(payload);
        dispatch({type:'SAVED',t:Date.now()});
      }catch(e){console.warn('Autosave failed',e);}
    },2200);
    return()=>clearTimeout(saveTimer.current);
  },[state.datasets,state.analyses,state.charts,state.projectName]);

  // Load most recent project on mount
  useEffect(()=>{
    dbList().then(projects=>{
      if(!projects.length)return;
      const latest=projects.sort((a,b)=>(b.savedAt||0)-(a.savedAt||0))[0];
      if(latest?.datasets?.length>0){
        dispatch({type:'LOAD',s:{...latest,activeId:latest.datasets[0]?.id||null}});
      }
    }).catch(()=>{});
  },[]);

  const renderModule=()=>{
    const p={state,dispatch};
    switch(state.module){
      case'home':return<HomeModule {...p}/>;
      case'data':return<DataModule {...p}/>;
      case'clean':return<CleanModule {...p}/>;
      case'visualize':return<VisualizeModule {...p}/>;
      case'analyze':return<AnalyzeModule {...p}/>;
      case'models':return<ModelsModule {...p}/>;
      case'tutorial':return<TutorialModule {...p}/>;
      case'report':return<ReportModule {...p}/>;
      default:return<HomeModule {...p}/>;
    }
  };

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar state={state} dispatch={dispatch}/>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',background:'var(--paper)'}}>
        <div style={{flex:1,overflow:'hidden'}}>
          {renderModule()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
