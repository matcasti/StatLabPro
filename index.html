let _db=null;
async function getDB(){
  if(_db)return _db;
  return new Promise((res,rej)=>{
    const r=indexedDB.open('StatLabPro',2);
    r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('projects'))db.createObjectStore('projects',{keyPath:'id'});};
    r.onsuccess=e=>{_db=e.target.result;res(_db);};
    r.onerror=()=>rej(r.error);
  });
}
async function dbSave(project){const db=await getDB();return new Promise((res,rej)=>{const tx=db.transaction('projects','readwrite');tx.objectStore('projects').put({...project,savedAt:Date.now()});tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});}
async function dbList(){const db=await getDB();return new Promise((res,rej)=>{const tx=db.transaction('projects','readonly');const r=tx.objectStore('projects').getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}

═══════════════════════════════════════════════════════════ */
const nan=v=>v===null||v===undefined||v===''||isNaN(Number(v));
const clean=arr=>arr.filter(v=>!nan(v)).map(Number);
function vmean(a){const v=clean(a);if(!v.length)return NaN;return v.reduce((s,x)=>s+x,0)/v.length;}
function vvariance(a,s=true){const v=clean(a);const n=v.length;if(n<2)return NaN;const m=vmean(v);return v.reduce((ss,x)=>ss+(x-m)**2,0)/(s?n-1:n);}
function vstd(a,s=true){return Math.sqrt(vvariance(a,s));}
function vmedian(a){const v=[...clean(a)].sort((a,b)=>a-b);if(!v.length)return NaN;const mid=Math.floor(v.length/2);return v.length%2?v[mid]:(v[mid-1]+v[mid])/2;}
function vquantile(a,q){const v=[...clean(a)].sort((a,b)=>a-b);if(!v.length)return NaN;const p=(v.length-1)*q,b=Math.floor(p),r=p-b;return v[b+1]!==undefined?v[b]+r*(v[b+1]-v[b]):v[b];}
function vskew(a){const v=clean(a);const n=v.length;if(n<3)return NaN;const m=vmean(v),s=vstd(v);return(n/((n-1)*(n-2)))*v.reduce((ss,x)=>ss+((x-m)/s)**3,0);}
function vkurt(a){const v=clean(a);const n=v.length;if(n<4)return NaN;const m=vmean(v),s=vstd(v);return((n*(n+1))/((n-1)*(n-2)*(n-3)))*v.reduce((ss,x)=>ss+((x-m)/s)**4,0)-(3*(n-1)**2)/((n-2)*(n-3));}
function lgamma(x){const c=[76.18009172947146,-86.50532032941677,24.01409824083091,-1.231739572450155,0.1208650973866179e-2,-0.5395239384953e-5];let y=x,tmp=x+5.5;tmp-=(x+0.5)*Math.log(tmp);let ser=1.000000000190015;for(let j=0;j<6;j++)ser+=c[j]/++y;return-tmp+Math.log(2.5066282746310005*ser/x);}
function betaCF(x,a,b){const MAXIT=200,EPS=3e-7,FPMIN=1e-30,qab=a+b,qap=a+1,qam=a-1;let c=1,d=1-qab*x/qap;if(Math.abs(d)<FPMIN)d=FPMIN;d=1/d;let h=d;for(let m=1;m<=MAXIT;m++){const m2=2*m;let aa=m*(b-m)*x/((qam+m2)*(a+m2));d=1+aa*d;if(Math.abs(d)<FPMIN)d=FPMIN;c=1+aa/c;if(Math.abs(c)<FPMIN)c=FPMIN;d=1/d;h*=d*c;aa=-(a+m)*(qab+m)*x/((a+m2)*(qap+m2));d=1+aa*d;if(Math.abs(d)<FPMIN)d=FPMIN;c=1+aa/c;if(Math.abs(c)<FPMIN)c=FPMIN;d=1/d;const del=d*c;h*=del;if(Math.abs(del-1)<EPS)break;}return h;}
function ibeta(x,a,b){if(x<=0)return 0;if(x>=1)return 1;const lb=lgamma(a)+lgamma(b)-lgamma(a+b),front=Math.exp(Math.log(x)*a+Math.log(1-x)*b-lb)/a;return front*betaCF(x,a,b);}
function tCDF(t,df){const x=df/(df+t*t),p=0.5*ibeta(x,df/2,0.5);return t>=0?1-p:p;}
function fCDF(x,d1,d2){if(x<=0)return 0;return ibeta(d1*x/(d1*x+d2),d1/2,d2/2);}
function igamma(a,x){if(x<=0)return 0;let s=0,t=1/a;s=t;for(let n=1;n<200;n++){t*=x/(a+n);s+=t;if(Math.abs(t)<1e-10*Math.abs(s))break;}return s*Math.exp(-x+a*Math.log(x)-lgamma(a));}
function chi2CDF(x,df){if(x<=0)return 0;return igamma(df/2,x/2)/Math.exp(lgamma(df/2));}
function normalCDF(x){const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;const sg=x<0?-1:1;x=Math.abs(x)/Math.sqrt(2);const t=1/(1+p*x);const poly=t*(a1+t*(a2+t*(a3+t*(a4+t*a5))));return 0.5*(1+sg*(1-poly*Math.exp(-x*x)));}
function tCrit(df,alpha){let lo=0,hi=20;for(let i=0;i<100;i++){const mid=(lo+hi)/2;if(1-tCDF(mid,df)>alpha)lo=mid;else hi=mid;}return(lo+hi)/2;}

function describe(arr){
  const v=clean(arr);const miss=arr.length-v.length;const n=v.length;
  if(!n)return{n:0,missing:miss};
  const m=vmean(v),s=vstd(v),se=s/Math.sqrt(n);
  const q1=vquantile(v,0.25),q3=vquantile(v,0.75);
  const tc=tCrit(n-1,0.025);
  return{n,missing:miss,mean:m,median:vmedian(v),sd:s,se,min:Math.min(...v),max:Math.max(...v),q1,q3,iqr:q3-q1,skewness:vskew(v),kurtosis:vkurt(v),ci95_lo:m-tc*se,ci95_hi:m+tc*se,sum:v.reduce((a,b)=>a+b,0)};
}

function ttest1(vals,mu0=0){
  const v=clean(vals);const n=v.length,m=vmean(v),s=vstd(v),se=s/Math.sqrt(n);
  const t=(m-mu0)/se,df=n-1,p=2*(1-tCDF(Math.abs(t),df)),tc=tCrit(df,0.025);
  return{label:'One-Sample t-Test',n,mean:m,sd:s,se,t,df,p,ci_lo:m-tc*se,ci_hi:m+tc*se,d:(m-mu0)/s,mu0};
}
function ttest2(a,b,eq=false){
  const va=clean(a),vb=clean(b);const n1=va.length,n2=vb.length,m1=vmean(va),m2=vmean(vb),s1=vstd(va),s2=vstd(vb);
  let se,df;
  if(eq){const sp=Math.sqrt(((n1-1)*s1**2+(n2-1)*s2**2)/(n1+n2-2));se=sp*Math.sqrt(1/n1+1/n2);df=n1+n2-2;}
  else{const vv=s1**2/n1+s2**2/n2;se=Math.sqrt(vv);df=vv**2/((s1**2/n1)**2/(n1-1)+(s2**2/n2)**2/(n2-1));}
  const t=(m1-m2)/se,p=2*(1-tCDF(Math.abs(t),df)),tc=tCrit(df,0.025);
  const sp2=Math.sqrt(((n1-1)*s1**2+(n2-1)*s2**2)/(n1+n2-2));
  return{label:eq?'Two-Sample t-Test (Equal Var)':"Welch's t-Test",n1,n2,mean1:m1,mean2:m2,sd1:s1,sd2:s2,diff:m1-m2,se,t,df,p,ci_lo:(m1-m2)-tc*se,ci_hi:(m1-m2)+tc*se,d:(m1-m2)/sp2};
}
function ttestpaired(a,b){
  const diffs=a.map((x,i)=>x-b[i]).filter((_,i)=>!nan(a[i])&&!nan(b[i]));
  return{...ttest1(diffs,0),label:'Paired t-Test'};
}
function pearsonR(x,y){

function mannWhitney(x,y){

function chiSqIndep(rows,c1,c2){

/* ── Wilcoxon Signed-Rank ── */
function wilcoxonSR(x,y){
  const pairs=x.map((xi,i)=>[xi,y[i]]).filter(([a,b])=>!nan(a)&&!nan(b));
  const diffs=pairs.map(([a,b])=>a-b).filter(d=>d!==0);
  const n=diffs.length;
  if(n<5)return{label:'Wilcoxon Signed-Rank Test',W:NaN,z:NaN,p:NaN,n};
  const items=diffs.map((d,i)=>({abs:Math.abs(d),sign:Math.sign(d),i})).sort((a,b)=>a.abs-b.abs);
  const ranks=new Array(n);
  for(let i=0;i<n;){let j=i;while(j<n&&items[j].abs===items[i].abs)j++;const r=(i+j-1)/2+1;for(let k=i;k<j;k++)ranks[k]=r;i=j;}
  const Wplus=items.reduce((s,item,i)=>item.sign>0?s+ranks[i]:s,0);
  const Wminus=items.reduce((s,item,i)=>item.sign<0?s+ranks[i]:s,0);
  const W=Math.min(Wplus,Wminus);
  const mu=n*(n+1)/4;
  const sigma=Math.sqrt(n*(n+1)*(2*n+1)/24);

function kruskalWallis(rows,dep,grp){

/* ── Negative Binomial GLM (log-link, IRLS, MoM θ) ── */

    mu=X.map(row=>Math.exp(Math.min(30,row.reduce((s,v,j)=>s+v*beta[j],0))));

  for(let i=0;i<n;i++)for(let a=0;a<k;a++)for(let b=0;b<k;b++)H[a][b]+=X[i][a]*W_f[i]*X[i][b];

  if(nn.filter(v=>!isNaN(Number(v))).length/nn.length>0.85)return'numeric';

}
function parseText(text){
  const r=Papa.parse(text.trim(),{header:true,skipEmptyLines:true,dynamicTyping:false});
  if(!r.data.length)return null;
  const cols=r.meta.fields||[];
  const rows=r.data.map((row,i)=>({id:i,...row}));
  const types={};cols.forEach(c=>{types[c]=inferType(rows.map(r=>r[c]));});
  return{columns:cols,rows,types};
}

function sigCls(p){if(p<0.001)return'p1';if(p<0.05)return'p5';if(p<0.1)return'p10';return'pns';}
function dlCSV(rows,name){const csv=Papa.unparse(rows);const b=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
function dlJSON(data,name){const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
function filterRows(rows,conds){
  return rows.filter(r=>conds.every(c=>{
    const v=r[c.col],n=Number(v);
    switch(c.op){case'==':return String(v)===String(c.val);case'!=':return String(v)!==String(c.val);case'>':return!isNaN(n)&&n>Number(c.val);case'<':return!isNaN(n)&&n<Number(c.val);case'>=':return!isNaN(n)&&n>=Number(c.val);case'<=':return!isNaN(n)&&n<=Number(c.val);case'contains':return String(v).toLowerCase().includes(String(c.val).toLowerCase());case'is_missing':return v===null||v===undefined||v==='';case'not_missing':return v!==null&&v!==undefined&&v!=='';default:return true;}
  }));
}
function pivotLonger(rows,cols,namesTo,valuesTo,idCols){
  const result=[];
  rows.forEach((row,i)=>{
    const base={};idCols.forEach(c=>{base[c]=row[c];});if(!idCols.length)base._id=i;
    cols.forEach(c=>result.push({...base,[namesTo]:c,[valuesTo]:row[c]}));
  });
  return result;
}

const initialState={datasets:[],activeId:null,analyses:[],charts:[],module:'home',projectName:'Untitled Project',projectId:'proj_'+Date.now(),savedAt:null};
function reducer(state,action){
  switch(action.type){
    case'SET_MODULE':return{...state,module:action.m};
    case'ADD_DS':{const ds=action.ds;return{...state,datasets:[...state.datasets,ds],activeId:ds.id};}
    case'UPD_DS':return{...state,datasets:state.datasets.map(d=>d.id===action.id?{...d,...action.up}:d)};
    case'DEL_DS':{const rem=state.datasets.filter(d=>d.id!==action.id);return{...state,datasets:rem,activeId:rem[0]?.id||null};}
    case'SET_ACTIVE':return{...state,activeId:action.id};
    case'ADD_ANALYSIS':return{...state,analyses:[action.a,...state.analyses]};
    case'ADD_CHART':return{...state,charts:[action.c,...state.charts]};
    case'DEL_CHART':return{...state,charts:state.charts.filter(c=>c.id!==action.id)};
    case'SET_NAME':return{...state,projectName:action.name};
    case'SAVED':return{...state,savedAt:action.t};
    case'LOAD':return{...state,...action.s,module:state.module};
    default:return state;
  }
}

    dispatch({type:'ADD_DS',ds:{id:'ds_'+Date.now(),name:'Pasted Data',columns:parsed.columns,rows:parsed.rows,types:parsed.types,createdAt:Date.now()}});

                  const v=getVal(ds,col);const freq={};v.forEach(x=>{freq[x]=(freq[x]||0)+1;});

                  const top=Object.entries(freq).filter(([k])=>k!=='').sort((a,b)=>b[1]-a[1])[0];
                  return(<tr key={col} onClick={()=>setSelCol(col)} style={{cursor:'pointer'}}>
                    <td style={{fontWeight:600}}>{col}</td><td><span className="pill pill-amber">text</span></td>
                    <td>{v.length-miss}</td><td style={{color:miss>0?'var(--danger)':'inherit'}}>{miss}</td>
                    <td style={{fontFamily:'inherit'}}>{top?`"${top[0]}" (${top[1]})`:'—'}</td>
                    <td>{Object.keys(freq).filter(k=>k!=='').length}</td>
                    <td>—</td><td>—</td><td>—</td>
                  </tr>);
                })}
              </tbody>
            </table>
          </div>
        )}
        {tab==='import'&&(
          <div style={{overflowY:'auto',padding:24,flex:1,maxWidth:680}}>
            <h3 style={{fontFamily:"'Crimson Pro',serif",fontSize:20,fontWeight:600,marginBottom:20}}>Import Data</h3>
            <div className={`drop-zone${drag?' drag':''}`} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f)loadFile(f);}} onClick={()=>document.getElementById('fi').click()} style={{marginBottom:24}}>
              <div style={{fontSize:36,marginBottom:12}}>📁</div>
              <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>Drop file here or click to browse</div>
              <div style={{color:'var(--text-muted)',fontSize:13}}>CSV, TSV, TXT (with header row)</div>
              <input id="fi" type="file" accept=".csv,.tsv,.txt" style={{display:'none'}} onChange={e=>{if(e.target.files[0])loadFile(e.target.files[0]);}}/>
            </div>
            <div style={{marginBottom:24}}>
              <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>Paste from Clipboard</div>
              <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:10}}>Paste data copied from Excel, Google Sheets, or any tab/comma-separated source. First row must be column names.</div>
              <textarea value={paste} onChange={e=>setPaste(e.target.value)} placeholder="id,group,value&#10;1,A,4.5&#10;2,B,3.2…" style={{width:'100%',height:130,border:'1px solid var(--border)',borderRadius:8,padding:12,fontFamily:'monospace',fontSize:12,resize:'vertical',outline:'none'}}/>
              <button className="btn btn-primary btn-sm" onClick={handlePaste} style={{marginTop:8}}>Parse & Load</button>
            </div>
            <div style={{background:'white',border:'1px solid var(--border)',borderRadius:10,padding:18}}>
              <div style={{fontWeight:600,fontSize:14,marginBottom:10}}>Built-in Sample Datasets</div>
              <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                {Object.entries(SAMPLES).map(([k,s])=>(
                  <button key={k} className="btn btn-secondary btn-sm" onClick={()=>{
                    dispatch({type:'ADD_DS',ds:{id:'ds_'+Date.now(),name:s.name,columns:s.cols,rows:s.rows,types:s.types,createdAt:Date.now()}});
                    setTab('grid');
                  }}><span>📊</span>{s.name}<span style={{color:'var(--text-light)',fontSize:11}}>({s.rows.length}×{s.cols.length})</span></button>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   CLEAN MODULE
═══════════════════════════════════════════════════════════ */
function CleanModule({state,dispatch}){
  const[tab,setTab]=useState('filter');
  const[conds,setConds]=useState([{col:'',op:'==',val:''}]);
  const[mutate,setMutate]=useState({name:'',expr:''});
  const[renameMap,setRenameMap]=useState({});
  const[pivot,setPivot]=useState({cols:[],namesTo:'name',valuesTo:'value'});
  const ds=state.datasets.find(d=>d.id===state.activeId);
  if(!ds)return(<div style={{display:'flex',flexDirection:'column',height:'100%'}}><div className="module-header"><div className="module-title">Data Workshop</div></div><div className="empty-state"><div style={{fontSize:48,opacity:0.2}}>⚙</div><p style={{color:'var(--text-muted)'}}>Load a dataset first.</p></div></div>);

  function applyFilter(){
    const v=conds.filter(c=>c.col&&c.op);const frows=filterRows(ds.rows,v);
    dispatch({type:'ADD_DS',ds:{id:'ds_'+Date.now(),name:ds.name+'_filtered',columns:ds.columns,rows:frows.map((r,i)=>({...r,id:i})),types:ds.types,createdAt:Date.now()}});
    alert(`New dataset created: ${frows.length} rows`);
  }
  function applyMutate(){
    if(!mutate.name||!mutate.expr)return;
    try{
      const newRows=ds.rows.map(row=>{
        let expr=mutate.expr;
        ds.columns.forEach(c=>{expr=expr.replace(new RegExp(`\\b${c}\\b`,'g'),`row['${c}']`);});
        const val=Function('row','Math',`"use strict";return ${expr}`)(row,Math);
        return{...row,[mutate.name]:val};
      });
      const newTypes={...ds.types,[mutate.name]:inferType(newRows.map(r=>r[mutate.name]))};
      const newCols=ds.columns.includes(mutate.name)?ds.columns:[...ds.columns,mutate.name];
      dispatch({type:'UPD_DS',id:ds.id,up:{rows:newRows,columns:newCols,types:newTypes}});
      setMutate({name:'',expr:''});
      alert(`Column "${mutate.name}" added successfully.`);
    }catch(e){alert('Expression error: '+e.message);}
  }
  function applyRename(){
    const newTypes={};const newCols=ds.columns.map(c=>{const n=renameMap[c]||c;newTypes[n]=ds.types[c];return n;});
    const newRows=ds.rows.map(r=>{const nr={id:r.id};ds.columns.forEach(c=>{nr[renameMap[c]||c]=r[c];});return nr;});
    dispatch({type:'UPD_DS',id:ds.id,up:{columns:newCols,rows:newRows,types:newTypes}});
    setRenameMap({});alert('Columns renamed.');
  }
  function applyPivotLonger(){
    if(!pivot.cols.length)return;
    const idCols=ds.columns.filter(c=>!pivot.cols.includes(c));
    const newRows=pivotLonger(ds.rows,pivot.cols,pivot.namesTo,pivot.valuesTo,idCols);
    const newCols=[...idCols,pivot.namesTo,pivot.valuesTo];
    const newTypes={};idCols.forEach(c=>newTypes[c]=ds.types[c]);newTypes[pivot.namesTo]='text';newTypes[pivot.valuesTo]=inferType(newRows.map(r=>r[pivot.valuesTo]));
    dispatch({type:'ADD_DS',ds:{id:'ds_'+Date.now(),name:ds.name+'_long',columns:newCols,rows:newRows.map((r,i)=>({...r,id:i})),types:newTypes,createdAt:Date.now()}});
    alert(`Long-format dataset created: ${newRows.length} rows`);
  }
  function dropMissing(targetCols){
    const newRows=ds.rows.filter(r=>targetCols.every(c=>r[c]!==null&&r[c]!==undefined&&r[c]!==''));
    dispatch({type:'ADD_DS',ds:{id:'ds_'+Date.now(),name:ds.name+'_clean',columns:ds.columns,rows:newRows.map((r,i)=>({...r,id:i})),types:ds.types,createdAt:Date.now()}});
    alert(`New dataset created: dropped ${ds.rows.length-newRows.length} rows with missing values.`);
  }

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div className="module-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div className="module-title">Data Workshop</div><div className="module-subtitle">Transform, filter, and reshape your data</div></div>
        {state.datasets.length>1&&<select className="select-field" style={{fontSize:12}} value={state.activeId||''} onChange={e=>dispatch({type:'SET_ACTIVE',id:e.target.value})}>{state.datasets.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}</select>}
      </div>
      <div style={{padding:'6px 20px 0',borderBottom:'1px solid var(--border)',background:'white',display:'flex',gap:4}}>
        {['filter','mutate','rename','reshape','missing'].map(t=><button key={t} className={`tab-btn${tab===t?' active':''}`} onClick={()=>setTab(t)} style={{fontSize:12,padding:'5px 12px'}}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>)}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:24}}>
        {tab==='filter'&&(
          <div style={{maxWidth:700}}>
            <h3 style={{fontFamily:"'Crimson Pro',serif",fontSize:18,fontWeight:600,marginBottom:4}}>Filter Rows</h3>
            <p style={{fontSize:13,color:'var(--text-muted)',marginBottom:20,lineHeight:1.6}}>Apply conditions to keep matching rows. Creates a new dataset.</p>
            {conds.map((c,i)=>(
              <div key={i} style={{display:'flex',gap:8,marginBottom:10,alignItems:'center'}}>
                <span style={{fontSize:12,color:'var(--text-muted)',width:32,textAlign:'center',flexShrink:0}}>{i===0?'IF':'AND'}</span>
                <select className="select-field" value={c.col} onChange={e=>setConds(cs=>cs.map((x,j)=>j===i?{...x,col:e.target.value}:x))} style={{flex:1,fontSize:12}}>
                  <option value="">Column…</option>{ds.columns.map(col=><option key={col} value={col}>{col}</option>)}
                </select>
                <select className="select-field" value={c.op} onChange={e=>setConds(cs=>cs.map((x,j)=>j===i?{...x,op:e.target.value}:x))} style={{width:140,fontSize:12}}>
                  {[['==','equals'],['!=','≠'],['>',' >'],[' <','<'],['>=','≥'],['<=','≤'],['contains','contains'],['is_missing','is missing'],['not_missing','not missing']].map(([v,l])=><option key={v} value={v}>{l}</option>)}
                </select>
                {!['is_missing','not_missing'].includes(c.op)&&<input className="input-field" value={c.val} onChange={e=>setConds(cs=>cs.map((x,j)=>j===i?{...x,val:e.target.value}:x))} placeholder="Value" style={{flex:1,fontSize:12}}/>}
                <button onClick={()=>setConds(cs=>cs.filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:18,lineHeight:1,padding:'0 4px'}}>×</button>
              </div>
            ))}
            <div style={{display:'flex',gap:10,marginTop:12}}>
              <button className="btn btn-secondary btn-sm" onClick={()=>setConds(cs=>[...cs,{col:'',op:'==',val:''}])}>+ Condition</button>
              <button className="btn btn-primary btn-sm" onClick={applyFilter}>Apply Filter → New Dataset</button>
            </div>
          </div>
        )}
        {tab==='mutate'&&(
          <div style={{maxWidth:620}}>
            <h3 style={{fontFamily:"'Crimson Pro',serif",fontSize:18,fontWeight:600,marginBottom:4}}>Compute New Variable</h3>
            <p style={{fontSize:13,color:'var(--text-muted)',marginBottom:20,lineHeight:1.6}}>Create a new column using an expression. Reference columns by name. Use <code>Math.log</code>, <code>Math.sqrt</code>, etc.</p>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:13,fontWeight:500,display:'block',marginBottom:5}}>New Column Name</label>
              <input className="input-field" value={mutate.name} onChange={e=>setMutate(m=>({...m,name:e.target.value}))} placeholder="e.g. log_weight" style={{width:280}}/>
            </div>
            <div style={{marginBottom:16}}>
              <label style={{fontSize:13,fontWeight:500,display:'block',marginBottom:5}}>Expression</label>
              <input className="input-field" value={mutate.expr} onChange={e=>setMutate(m=>({...m,expr:e.target.value}))} placeholder={`e.g. Math.log(${ds.columns[0]}) or ${ds.columns[0]} / ${ds.columns[1]||'100'}`} style={{width:'100%',fontFamily:'monospace',fontSize:12}}/>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:5}}>Available: {ds.columns.join(', ')}</div>
            </div>
            <button className="btn btn-primary btn-sm" onClick={applyMutate}>Compute & Add Column</button>
            <div style={{marginTop:20,padding:14,background:'white',border:'1px solid var(--border)',borderRadius:9}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>Examples</div>
              {[[`Math.log(${ds.columns[0]})`,'log transform'],[`Math.sqrt(${ds.columns[0]})`,'square root'],[`${ds.columns[0]} / (${ds.columns[1]||ds.columns[0]})`,'ratio'],[`Math.round(${ds.columns[0]} * 100) / 100`,'round to 2 dp']].map(([ex,name])=>(
                <div key={name} onClick={()=>setMutate(m=>({...m,expr:ex}))} style={{fontSize:12,marginBottom:5,cursor:'pointer',display:'flex',gap:10}}>
                  <span style={{color:'var(--gold)',fontWeight:700,flexShrink:0}}>→</span>
                  <code style={{color:'var(--blue)',fontFamily:'monospace'}}>{ex}</code>
                  <span style={{color:'var(--text-muted)'}}>{name}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        {tab==='rename'&&(
          <div style={{maxWidth:500}}>
            <h3 style={{fontFamily:"'Crimson Pro',serif",fontSize:18,fontWeight:600,marginBottom:4}}>Rename Columns</h3>
            <p style={{fontSize:13,color:'var(--text-muted)',marginBottom:20}}>Edit names below. Leave blank to keep original.</p>
            {ds.columns.map(col=>(
              <div key={col} style={{display:'flex',alignItems:'center',gap:14,marginBottom:10}}>
                <span style={{fontFamily:'monospace',fontSize:12,width:160,color:'var(--text-muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flexShrink:0}}>{col}</span>
                <span style={{color:'var(--text-muted)'}}>→</span>
                <input className="input-field" value={renameMap[col]||''} onChange={e=>setRenameMap(m=>({...m,[col]:e.target.value}))} placeholder={col} style={{width:200,fontSize:12}}/>
              </div>
            ))}
            <button className="btn btn-primary btn-sm" onClick={applyRename} style={{marginTop:8}}>Apply Renames</button>
          </div>
        )}
        {tab==='reshape'&&(
          <div style={{maxWidth:700}}>
            <h3 style={{fontFamily:"'Crimson Pro',serif",fontSize:18,fontWeight:600,marginBottom:4}}>Reshape: Pivot Longer</h3>
            <p style={{fontSize:13,color:'var(--text-muted)',marginBottom:20,lineHeight:1.6}}>Select "value" columns to gather — transforms wide format to long (tidy) format. ID columns remain fixed.</p>
            <div style={{marginBottom:16}}>
              <label style={{fontSize:13,fontWeight:500,display:'block',marginBottom:8}}>Value Columns to Pivot</label>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {ds.columns.map(col=>(
                  <label key={col} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 11px',background:pivot.cols.includes(col)?'var(--navy)':'white',color:pivot.cols.includes(col)?'white':'inherit',border:'1px solid',borderColor:pivot.cols.includes(col)?'var(--navy)':'var(--border)',borderRadius:7,cursor:'pointer',fontSize:12,transition:'all 0.12s'}}>
                    <input type="checkbox" checked={pivot.cols.includes(col)} onChange={e=>setPivot(p=>({...p,cols:e.target.checked?[...p.cols,col]:p.cols.filter(x=>x!==col)}))} style={{display:'none'}}/>
                    {col}
                  </label>
                ))}
              </div>
            </div>
            <div style={{display:'flex',gap:14,marginBottom:16}}>
              <div><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:5}}>Names Column</label><input className="input-field" value={pivot.namesTo} onChange={e=>setPivot(p=>({...p,namesTo:e.target.value}))} style={{width:160,fontSize:12}}/></div>
              <div><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:5}}>Values Column</label><input className="input-field" value={pivot.valuesTo} onChange={e=>setPivot(p=>({...p,valuesTo:e.target.value}))} style={{width:160,fontSize:12}}/></div>
            </div>
            <button className="btn btn-primary btn-sm" onClick={applyPivotLonger} disabled={!pivot.cols.length}>Pivot Longer → New Dataset</button>
            <div style={{marginTop:16,padding:12,background:'rgba(74,127,168,0.06)',borderRadius:8,fontSize:12,color:'var(--blue)'}}>
              ID columns (unchanged): {ds.columns.filter(c=>!pivot.cols.includes(c)).join(', ')||'none'}
            </div>
          </div>
        )}
        {tab==='missing'&&(
          <div style={{maxWidth:600}}>
            <h3 style={{fontFamily:"'Crimson Pro',serif",fontSize:18,fontWeight:600,marginBottom:4}}>Missing Value Diagnostics</h3>
            <p style={{fontSize:13,color:'var(--text-muted)',marginBottom:20}}>Inspect and handle missing data before analysis.</p>
            <table className="result-table" style={{marginBottom:20}}>
              <thead><tr><th>Column</th><th>Missing n</th><th>Missing %</th><th>Action</th></tr></thead>
              <tbody>
                {ds.columns.map(col=>{
                  const tot=ds.rows.length;const miss=ds.rows.filter(r=>r[col]===null||r[col]===undefined||r[col]==='').length;
                  return(<tr key={col}>
                    <td style={{fontWeight:500}}>{col}</td>
                    <td style={{color:miss>0?'var(--danger)':'var(--success)',fontWeight:miss>0?600:400}}>{miss}</td>
                    <td style={{color:miss>0?'var(--danger)':'var(--text-muted)'}}>{(miss/tot*100).toFixed(1)}%</td>
                    <td>{miss>0&&<button className="btn btn-secondary btn-xs" onClick={()=>dropMissing([col])}>Drop rows for this col</button>}</td>
                  </tr>);
                })}
              </tbody>
            </table>
            <button className="btn btn-primary btn-sm" onClick={()=>dropMissing(ds.columns)}>Drop All Rows with Any Missing → New Dataset</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   DRAG-AND-DROP VARIABLE PANEL
═══════════════════════════════════════════════════════════ */
// slotDefs: [{key, label, hint, multi?, types?}]
// values: {key: colName | null}
// onChange: fn(newValues)
function DragVarPanel({ds,slotDefs,values,onChange}){
  const[dragging,setDragging]=useState(null); // {col, fromSlot}
  const[overSlot,setOverSlot]=useState(null);
  const enterCounters=useRef({});

  // Global dragend clears state if drop lands outside any valid zone
  useEffect(()=>{
    const clear=()=>{setDragging(null);setOverSlot(null);};
    document.addEventListener('dragend',clear);
    return()=>document.removeEventListener('dragend',clear);
  },[]);

  const assigned=Object.values(values).filter(Boolean);
  const available=ds?ds.columns.filter(c=>!assigned.includes(c)):[];

  function onDragStart(e,col,fromSlot='pool'){
    setDragging({col,fromSlot});
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',col);
  }

  function enterZone(key){
    enterCounters.current[key]=(enterCounters.current[key]||0)+1;
    setOverSlot(key);
  }
  function leaveZone(key){
    enterCounters.current[key]=Math.max(0,(enterCounters.current[key]||1)-1);
    if(enterCounters.current[key]===0) setOverSlot(s=>s===key?null:s);
  }
  function resetZone(key){enterCounters.current[key]=0;}

  function onDropSlot(e,slotKey){
    e.preventDefault();resetZone(slotKey);setOverSlot(null);
    if(!dragging)return;
    const def=slotDefs.find(s=>s.key===slotKey);
    if(def?.types&&!def.types.includes(ds.types[dragging.col])){setDragging(null);return;}
    const next={...values};
    if(dragging.fromSlot&&dragging.fromSlot!=='pool') next[dragging.fromSlot]=null;
    next[slotKey]=dragging.col;
    onChange(next);setDragging(null);
  }

  function onDropPool(e){
    e.preventDefault();resetZone('pool');setOverSlot(null);
    if(dragging?.fromSlot&&dragging.fromSlot!=='pool'){onChange({...values,[dragging.fromSlot]:null});}
    setDragging(null);
  }

  return(
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      {/* Variable pool */}
      <div>
        <div style={{fontSize:10,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:6}}>Variables — drag to slots below</div>
        <div className={`var-pool${overSlot==='pool'?' over':''}`}
          onDragOver={e=>{e.preventDefault();e.dataTransfer.dropEffect='move';}}
          onDragEnter={()=>enterZone('pool')}
          onDragLeave={()=>leaveZone('pool')}
          onDrop={onDropPool}
        >
          {available.map(col=>{
            const isDraggingThis=dragging?.col===col;
            return(
              <div key={col}
                className={`var-chip ${ds&&ds.types[col]==='numeric'?'num':'cat'}${isDraggingThis?' dragging':''}`}
                draggable onDragStart={e=>onDragStart(e,col,'pool')} onDragEnd={()=>{setDragging(null);setOverSlot(null);}}
                title={`${col} · ${ds.types[col]}`}
              >
                <span className="var-badge">{ds.types[col]==='numeric'?'#':'T'}</span>{col}
              </div>
            );
          })}
          {!available.length&&<span style={{fontSize:11,color:'var(--text-light)',fontStyle:'italic',padding:'2px 4px'}}>All variables assigned</span>}
        </div>
      </div>

      {/* Drop slots */}
      {slotDefs.map(def=>{
        const val=values[def.key];
        const isOver=overSlot===def.key;
        const isIncompatible=dragging&&def.types&&!def.types.includes(ds?.types[dragging.col]);
        const borderColor=isOver?(isIncompatible?'var(--danger)':'var(--blue)'):val?'var(--border)':'#D5D2CC';
        const bg=isOver?(isIncompatible?'rgba(239,68,68,0.04)':'rgba(74,127,168,0.06)'):val?'white':'rgba(247,246,242,0.6)';

        return(
          <div key={def.key}>
            <div style={{fontSize:10,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:5,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              {def.label}
              {def.types&&<span style={{fontWeight:400,color:'var(--text-light)',fontSize:9,background:'var(--paper-dark)',padding:'1px 5px',borderRadius:4}}>{def.types.join(' · ')}</span>}
            </div>
            <div
              className={`drop-slot${isOver&&!isIncompatible?' over':''}${val?' filled':''}`}
              style={{borderColor,background,transition:'border-color 0.12s,background 0.12s',cursor:isIncompatible&&isOver?'not-allowed':'default'}}
              onDragOver={e=>{e.preventDefault();e.dataTransfer.dropEffect=isIncompatible?'none':'move';}}
              onDragEnter={()=>enterZone(def.key)}
              onDragLeave={()=>leaveZone(def.key)}
              onDrop={e=>onDropSlot(e,def.key)}
            >
              {val?(
                <div className={`var-chip ${ds.types[val]==='numeric'?'num':'cat'}`}
                  draggable onDragStart={e=>onDragStart(e,val,def.key)} onDragEnd={()=>{setDragging(null);setOverSlot(null);}}
                >
                  <span className="var-badge">{ds.types[val]==='numeric'?'#':'T'}</span>
                  {val}
                  <span onClick={()=>onChange({...values,[def.key]:null})} style={{marginLeft:5,cursor:'pointer',opacity:0.45,fontSize:14,lineHeight:1}}>×</span>
                </div>
              ):(
                <span className="slot-hint">{isIncompatible?`⛔ Needs ${def.types?.join('/')}`:def.hint||`Drop ${def.label}`}</span>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   VISUALIZE MODULE
═══════════════════════════════════════════════════════════ */
function VisualizeModule({state,dispatch}){
  const[cfg,setCfg]=useState({type:'scatter',x:'',y:'',color:'',title:''});
  const[rendered,setRendered]=useState(false);
  // Clear slots that violate the new chart type's constraints
  useEffect(()=>{
    const numOnly=['histogram','box','violin'];
    if(numOnly.includes(cfg.type)&&cfg.x&&ds&&ds.types[cfg.x]!=='numeric'){
      setCfg(c=>({...c,x:''}));
    }
    if(cfg.y&&ds&&ds.types[cfg.y]!=='numeric'){
      setCfg(c=>({...c,y:''}));
    }
  },[cfg.type]); // eslint-disable-line
  const chartRef=useRef(null);
  const ds=state.datasets.find(d=>d.id===state.activeId);
  const nc=ds?numCols(ds):[];const cc=ds?catCols(ds):[];const ac=ds?ds.columns:[];
  const PALETTE=['#4A7FA8','#C8903E','#22C55E','#EF4444','#8B5CF6','#EC4899','#14B8A6','#F97316','#06B6D4','#84CC16'];

  useEffect(()=>{if(ds&&cfg.x&&chartRef.current)renderChart();},[cfg,state.activeId]);

  function renderChart(){
    if(!ds||!cfg.x||!chartRef.current)return;
    const{type,x,y,color,title}=cfg;
    const layout={
      title:{text:title||(type+': '+x+(y?' vs '+y:'')),font:{family:'Outfit,sans-serif',size:13}},
      paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',
      font:{family:'Outfit,sans-serif',size:11},
      margin:{l:50,r:20,t:48,b:48},
      xaxis:{title:x,gridcolor:'#E8E6E1',linecolor:'#D5D2CC',zeroline:false},
      yaxis:{title:y||'',gridcolor:'#E8E6E1',linecolor:'#D5D2CC',zeroline:false},
      legend:{bgcolor:'rgba(0,0,0,0)',font:{size:11}},
      hoverlabel:{font:{family:'Outfit,sans-serif',size:11}},
    };
    const colorGroups=color&&ds.types[color]!=='numeric'?[...new Set(ds.rows.map(r=>r[color]).filter(Boolean))]:[null];
    let traces=[];
    if(type==='scatter'){
      colorGroups.forEach((g,gi)=>{
        const rows=g!==null?ds.rows.filter(r=>r[color]==g):ds.rows;
        traces.push({type:'scatter',mode:'markers',x:rows.map(r=>Number(r[x])),y:y?rows.map(r=>Number(r[y])):undefined,name:g||'',marker:{color:PALETTE[gi%PALETTE.length],size:7,opacity:0.72,line:{width:0.5,color:'white'}},hovertemplate:`${x}: %{x}<br>${y}: %{y}<extra>${g||''}</extra>`});
      });
    }else if(type==='histogram'){
      colorGroups.forEach((g,gi)=>{
        const rows=g!==null?ds.rows.filter(r=>r[color]==g):ds.rows;
        traces.push({type:'histogram',x:rows.map(r=>Number(r[x])),name:g||x,opacity:0.75,marker:{color:PALETTE[gi%PALETTE.length]}});
      });
      layout.barmode='overlay';
    }else if(type==='box'){
      if(color&&ds.types[color]!=='numeric'){
        colorGroups.forEach((g,gi)=>{traces.push({type:'box',y:ds.rows.filter(r=>r[color]==g).map(r=>Number(r[x])),name:String(g),marker:{color:PALETTE[gi%PALETTE.length]},boxpoints:'outliers',jitter:0.3,line:{width:1.5}});});
      }else if(y){
        const grps=[...new Set(ds.rows.map(r=>r[y]).filter(Boolean))];
        grps.forEach((g,gi)=>traces.push({type:'box',y:ds.rows.filter(r=>r[y]==g).map(r=>Number(r[x])),name:String(g),marker:{color:PALETTE[gi%PALETTE.length]},boxpoints:'outliers',jitter:0.3}));
      }else{
        traces.push({type:'box',y:ds.rows.map(r=>Number(r[x])),name:x,marker:{color:PALETTE[0]},boxpoints:'outliers'});
      }
    }else if(type==='bar'){
      if(y){
        colorGroups.forEach((g,gi)=>{
          const rows=g!==null?ds.rows.filter(r=>r[color]==g):ds.rows;
          traces.push({type:'bar',x:rows.map(r=>r[x]),y:rows.map(r=>Number(r[y])),name:g||y,marker:{color:PALETTE[gi%PALETTE.length],opacity:0.85}});
        });
      }else{
        const freq={};ds.rows.forEach(r=>{freq[r[x]]=(freq[r[x]]||0)+1;});
        const s=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
        traces.push({type:'bar',x:s.map(e=>e[0]),y:s.map(e=>e[1]),name:'Count',marker:{color:PALETTE[0],opacity:0.85}});
        layout.yaxis.title='Count';
      }
    }else if(type==='line'){
      colorGroups.forEach((g,gi)=>{
        const rows=(g!==null?ds.rows.filter(r=>r[color]==g):ds.rows).sort((a,b)=>Number(a[x])-Number(b[x]));
        traces.push({type:'scatter',mode:'lines+markers',x:rows.map(r=>r[x]),y:y?rows.map(r=>Number(r[y])):undefined,name:g||y,line:{color:PALETTE[gi%PALETTE.length],width:2},marker:{size:5}});
      });
    }else if(type==='heatmap'){
      const hcols=nc.slice(0,8);
      const cr=corrMatrix(ds.rows,hcols,'pearson');
      const z=cr.matrix.map(row=>row.map(c=>c.r));
      traces.push({type:'heatmap',z,x:hcols,y:hcols,colorscale:[['0','#2166AC'],['0.5','white'],['1','#D73027']],zmid:0,zmin:-1,zmax:1,text:z.map(r=>r.map(v=>v.toFixed(2))),texttemplate:'%{text}',hovertemplate:'%{x} × %{y}: %{z:.3f}<extra></extra>'});
      layout.title.text='Correlation Heatmap';
    }else if(type==='violin'){
      colorGroups.forEach((g,gi)=>{
        const rows=g!==null?ds.rows.filter(r=>r[color]==g):ds.rows;
        traces.push({type:'violin',y:rows.map(r=>Number(r[x])),name:g||x,box:{visible:true},meanline:{visible:true},line:{color:PALETTE[gi%PALETTE.length]},opacity:0.8,points:'outliers'});
      });
    }
    Plotly.react(chartRef.current,traces,layout,{responsive:true,displayModeBar:true,displaylogo:false,modeBarButtonsToRemove:['sendDataToCloud','editInChartStudio']});
    setRendered(true);
  }

  function dlChart(fmt){if(!chartRef.current)return;Plotly.downloadImage(chartRef.current,{format:fmt,filename:'statlab_chart',width:1400,height:900});}

  if(!ds)return(<div style={{display:'flex',flexDirection:'column',height:'100%'}}><div className="module-header"><div className="module-title">Visualization Studio</div></div><div className="empty-state"><div style={{fontSize:48,opacity:0.18}}>◈</div><p style={{color:'var(--text-muted)'}}>Load a dataset first.</p></div></div>);

  const CHART_TYPES=[{id:'scatter',l:'Scatter'},{id:'histogram',l:'Histogram'},{id:'box',l:'Box Plot'},{id:'bar',l:'Bar Chart'},{id:'line',l:'Line'},{id:'heatmap',l:'Correlation Heatmap'},{id:'violin',l:'Violin'}];

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div className="module-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div className="module-title">Visualization Studio</div><div className="module-subtitle">Build interactive, exportable charts</div></div>
        {state.datasets.length>1&&<select className="select-field" style={{fontSize:12}} value={state.activeId||''} onChange={e=>dispatch({type:'SET_ACTIVE',id:e.target.value})}>{state.datasets.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}</select>}
      </div>
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        <div className="side-panel" style={{width:230}}>
          <div className="section-head" style={{paddingLeft:0}}>Chart Type</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:16}}>
            {CHART_TYPES.map(ct=>(
              <button key={ct.id} onClick={()=>setCfg(c=>({...c,type:ct.id}))} style={{padding:'7px 4px',fontSize:11,border:'1px solid',fontFamily:"'Outfit',sans-serif",fontWeight:500,cursor:'pointer',borderRadius:6,transition:'all 0.12s',borderColor:cfg.type===ct.id?'var(--navy)':'var(--border)',background:cfg.type===ct.id?'var(--navy)':'white',color:cfg.type===ct.id?'white':'inherit'}}>{ct.l}</button>
            ))}
          </div>
          <div className="section-head" style={{paddingLeft:0}}>Variables</div>
          {cfg.type!=='heatmap'&&(
            <DragVarPanel
              ds={ds}
              slotDefs={[
                {key:'x',label:'X Axis',hint:'Drop a variable here',types:cfg.type==='histogram'||cfg.type==='box'||cfg.type==='violin'?['numeric']:null},
                {key:'y',label:'Y Axis',hint:'Optional (some chart types)',types:['numeric']},
                {key:'color',label:'Color / Group',hint:'Optional grouping variable'},
              ]}
              values={{x:cfg.x||null,y:cfg.y||null,color:cfg.color||null}}
              onChange={v=>setCfg(c=>({...c,x:v.x||'',y:v.y||'',color:v.color||''}))}
            />
          )}
          {cfg.type==='heatmap'&&(
            <div style={{fontSize:12,color:'var(--text-muted)',padding:'8px 10px',background:'var(--paper)',borderRadius:7,border:'1px solid var(--border)'}}>
              Heatmap uses all numeric columns automatically.
            </div>
          )}
          <div style={{marginBottom:14}}>
            <label style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em',display:'block',marginBottom:4}}>Title</label>
            <input className="input-field" value={cfg.title} onChange={e=>setCfg(c=>({...c,title:e.target.value}))} placeholder="Optional…" style={{width:'100%',fontSize:12}}/>
          </div>
          <button className="btn btn-gold" onClick={renderChart} style={{width:'100%',marginBottom:8}}>Render Chart</button>
          {rendered&&(
            <>
              <button className="btn btn-secondary btn-sm" onClick={()=>dispatch({type:'ADD_CHART',c:{id:'ch_'+Date.now(),cfg:{...cfg},dsId:ds.id,t:Date.now()}})} style={{width:'100%',marginBottom:8,fontSize:12}}>Save to Report</button>
              <div style={{display:'flex',gap:4}}>
                {['png','svg','pdf'].map(f=><button key={f} className="btn btn-secondary" style={{flex:1,fontSize:11,padding:'5px 4px'}} onClick={()=>dlChart(f)}>{f.toUpperCase()}</button>)}
              </div>
            </>
          )}
        </div>
        <div style={{flex:1,padding:20,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          {!cfg.x?(
            <div className="empty-state"><div style={{fontSize:48,opacity:0.15}}>◈</div><p style={{color:'var(--text-muted)',fontSize:13}}>Select a variable for the X axis to build a chart</p></div>
          ):(
            <div ref={chartRef} style={{flex:1,minHeight:400}}/>
          )}
        </div>
      </div>
    </div>
  );
}

function SigLegend(){
  return(
    <div style={{display:'flex',gap:14,marginTop:18,paddingTop:12,borderTop:'1px solid var(--border)',fontSize:11,color:'var(--text-muted)',flexWrap:'wrap'}}>
      <span style={{fontWeight:600}}>Codes:</span>
      {[['***','p<.001'],['**','p<.01'],['*','p<.05'],['.','p<.10'],['n.s.','p≥.10']].map(([c,l])=><span key={c}><strong>{c}</strong> {l}</span>)}
    </div>
  );
}
function SigBadge({p}){return <span className={`pill ${sigCls(p)}`}>{fmtP(p)} {sig(p)}</span>;}
function StatCard({label,value}){return(<div className="stat-card" style={{padding:12}}><div style={{fontSize:11,color:'var(--text-muted)',marginBottom:3}}>{label}</div><div style={{fontFamily:'monospace',fontSize:17,fontWeight:600,letterSpacing:'-0.02em'}}>{value}</div></div>);}

  {id:'descriptive',l:'Descriptive Statistics',g:'Summary'},
  {id:'ttest1',l:'One-Sample t-Test',g:'Hypothesis Tests'},
  {id:'ttest2',l:'Two-Sample / Welch t-Test',g:'Hypothesis Tests'},
  {id:'ttestpaired',l:'Paired t-Test',g:'Hypothesis Tests'},
  {id:'anova1',l:'One-Way ANOVA',g:'ANOVA'},
  {id:'correlation',l:'Correlation Analysis',g:'Association'},
  {id:'regression',l:'Multiple Linear Regression',g:'Models'},
  {id:'mannwhitney',l:'Mann-Whitney U',g:'Nonparametric'},
  {id:'wilcoxon',l:'Wilcoxon Signed-Rank',g:'Nonparametric'},
  {id:'kruskal',l:'Kruskal-Wallis H Test',g:'Nonparametric'},

  {id:'relate',icon:'⟳',label:'Relationships',desc:'Correlation & regression',color:'#8B5CF6',bgColor:'rgba(139,92,246,0.1)'},
  {id:'summarize',icon:'≡',label:'Describe Data',desc:'Summary statistics & distributions',color:'#22C55E',bgColor:'rgba(34,197,94,0.1)'},
  {id:'model',icon:'⌁',label:'Predict / Model',desc:'Regression & GLM families',color:'#C8903E',bgColor:'rgba(200,144,62,0.1)'},
  {id:'categorical',icon:'χ',label:'Categorical',desc:'Chi-square & contingency tables',color:'#0891B2',bgColor:'rgba(8,145,178,0.1)'},

      {id:'regression',label:'Linear Regression (OLS)',note:'Predict a continuous outcome'},

  ],

function AnalysisWizardPanel({test,setTest,setResult,setCfg,dispatch}){
  const[intent,setIntent]=useState(null);

  function choose(t){
    if(t.redirect){dispatch({type:'SET_MODULE',m:t.redirect});return;}
    setIntent(null);setTest(t.id);setResult(null);setCfg(t.autoConfig||{});
  }

  return(
    <div style={{overflowY:'auto',padding:'8px 0',flex:1}}>
      {!intent?(
        <div className="slide-in">
          <div style={{padding:'8px 14px 6px',fontSize:10,fontWeight:600,color:'rgba(255,255,255,0.28)',textTransform:'uppercase',letterSpacing:'0.07em'}}>What do you want to do?</div>
          {WIZARD_INTENTS.map(w=>(
            <div key={w.id} onClick={()=>setIntent(w.id)}
              style={{margin:'1px 8px',padding:'9px 12px',borderRadius:8,cursor:'pointer',transition:'all 0.15s',display:'flex',alignItems:'center',gap:10}}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.07)'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}
            >
              <div style={{width:30,height:30,borderRadius:7,background:w.bgColor,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:w.color,flexShrink:0}}>{w.icon}</div>
              <div>
                <div style={{fontSize:12,fontWeight:500,color:'rgba(255,255,255,0.85)'}}>{w.label}</div>
                <div style={{fontSize:11,color:'rgba(255,255,255,0.3)',marginTop:1}}>{w.desc}</div>
              </div>
              <div style={{marginLeft:'auto',fontSize:10,color:'rgba(255,255,255,0.2)'}}>›</div>
            </div>
          ))}
          <div style={{margin:'10px 8px 0',borderTop:'1px solid rgba(255,255,255,0.07)',paddingTop:10}}>
            <div style={{padding:'4px 6px',fontSize:10,fontWeight:600,color:'rgba(255,255,255,0.28)',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:4}}>Or pick directly</div>
            {TESTS.map(t=>(
              <div key={t.id} onClick={()=>choose(t)}
                style={{padding:'7px 12px',fontSize:12,cursor:'pointer',fontWeight:test===t.id?600:400,background:test===t.id?'rgba(200,144,62,0.15)':'transparent',borderLeft:`2.5px solid ${test===t.id?'var(--gold)':'transparent'}`,color:test===t.id?'#fff':'rgba(255,255,255,0.45)',transition:'all 0.1s',borderRadius:'0 6px 6px 0'}}
                onMouseEnter={e=>{if(test!==t.id)e.currentTarget.style.color='rgba(255,255,255,0.78)';}}
                onMouseLeave={e=>{if(test!==t.id)e.currentTarget.style.color='rgba(255,255,255,0.45)';}}
              >{t.l}</div>
            ))}
          </div>
        </div>
      ):(
        <div className="slide-in">
          <button onClick={()=>setIntent(null)} className="ghost-btn" style={{margin:'8px 14px',color:'rgba(255,255,255,0.5)'}}>← Back</button>
          <div style={{padding:'4px 14px 10px',fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.6)',borderBottom:'1px solid rgba(255,255,255,0.07)',marginBottom:6}}>
            {WIZARD_INTENTS.find(w=>w.id===intent)?.label}
          </div>
          {(INTENT_TESTS[intent]||[]).map((section,si)=>(
            <div key={si} style={{marginBottom:4}}>
              {section.heading&&(
                <div style={{display:'flex',alignItems:'center',gap:7,padding:'8px 14px 5px',marginTop:si>0?6:0}}>
                  <span style={{fontSize:9,fontWeight:700,padding:'2px 8px',borderRadius:20,background:section.tagBg||'rgba(255,255,255,0.08)',color:section.tagColor||'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'0.08em',border:`1px solid ${section.tagColor?section.tagColor+'30':'rgba(255,255,255,0.12)'}`}}>
                    {section.heading}
                  </span>
                </div>
              )}
              {section.tests.map(t=>(
                <div key={t.id+t.label} onClick={()=>choose(t)}
                  style={{margin:'1px 8px',padding:'9px 13px',borderRadius:8,cursor:'pointer',transition:'all 0.15s',background:test===t.id&&!t.redirect?'rgba(200,144,62,0.15)':'rgba(255,255,255,0.03)',border:`1px solid ${test===t.id&&!t.redirect?'rgba(200,144,62,0.28)':'transparent'}`}}
                  onMouseEnter={e=>{if(!(test===t.id&&!t.redirect))e.currentTarget.style.background='rgba(255,255,255,0.07)';}}
                  onMouseLeave={e=>{if(!(test===t.id&&!t.redirect))e.currentTarget.style.background='rgba(255,255,255,0.03)';}}
                >
                  <div style={{fontSize:12,fontWeight:600,color:test===t.id&&!t.redirect?'var(--gold)':'rgba(255,255,255,0.85)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    {t.label}
                    {t.redirect&&<span style={{fontSize:9,color:'rgba(255,255,255,0.3)',letterSpacing:'0.05em',textTransform:'uppercase'}}>→ Builder</span>}
                  </div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,0.35)',marginTop:2}}>{t.note}</div>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   RESULT CHART COMPONENT
═══════════════════════════════════════════════════════════ */
function ResultChart({r,ds,cfg}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    try{_renderResultChart(r,ds,cfg,ref.current);}catch(e){console.warn('ResultChart:',e);}
  },[r]);
  return <div ref={ref} style={{height:300,width:'100%',marginTop:4}}/>;
}

function _renderResultChart(r,ds,cfg,el){
  if(!el)return;
  const PAL=['#4A7FA8','#C8903E','#22C55E','#EF4444','#8B5CF6','#EC4899'];
  const L={
    paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',
    font:{family:'Outfit,sans-serif',size:11},
    margin:{l:52,r:16,t:28,b:44},
    xaxis:{gridcolor:'#E8E6E1',linecolor:'#D5D2CC',zeroline:false},
    yaxis:{gridcolor:'#E8E6E1',linecolor:'#D5D2CC',zeroline:false},
    legend:{bgcolor:'rgba(0,0,0,0)',font:{size:11}},
    hoverlabel:{font:{family:'Outfit,sans-serif',size:11}},
  };
  const OPT={responsive:true,displaylogo:false,modeBarButtonsToRemove:['sendDataToCloud','editInChartStudio','lasso2d','select2d']};

  if((r._type==='ttest2'||r._type==='mw')&&ds&&cfg){
    const dep=cfg.col,grpCol=cfg.groupCol,g1=String(cfg.g1||''),g2=String(cfg.g2||'');
    if(!dep||!grpCol)return;
    const getGrp=g=>ds.rows.filter(row=>String(row[grpCol])===g).map(row=>Number(row[dep])).filter(v=>!isNaN(v));
    const v1=getGrp(g1),v2=getGrp(g2);
    if(!v1.length||!v2.length)return;
    Plotly.react(el,[
      {type:'violin',y:v1,name:g1,box:{visible:true},meanline:{visible:true},line:{color:PAL[0]},fillcolor:PAL[0]+'33',opacity:0.85,points:'outliers'},
      {type:'violin',y:v2,name:g2,box:{visible:true},meanline:{visible:true},line:{color:PAL[1]},fillcolor:PAL[1]+'33',opacity:0.85,points:'outliers'},
    ],{...L,yaxis:{...L.yaxis,title:dep}},OPT);
  }
  else if(r._type==='ttest1'&&ds&&cfg){
    const col=cfg.col;if(!col)return;
    const v=getNum(ds,col);const mu0=Number(cfg.mu0||0);
    Plotly.react(el,[
      {type:'histogram',x:v,name:col,opacity:0.72,marker:{color:PAL[0]+'CC'}},
      {type:'scatter',x:[mu0,mu0],y:[0,v.length*0.18||1],mode:'lines',name:'H₀: μ₀='+mu0,line:{color:PAL[3],width:2.5,dash:'dash'}},
    ],{...L,barmode:'overlay',xaxis:{...L.xaxis,title:col},yaxis:{...L.yaxis,title:'Count'}},OPT);
  }
  else if((r._type==='ttestpaired'||r._type==='wilcoxon_sr')&&ds&&cfg){
    const col1=cfg.col1,col2=cfg.col2;if(!col1||!col2)return;
    const pairs=ds.rows.map(row=>{const a=Number(row[col1]),b=Number(row[col2]);return(!isNaN(a)&&!isNaN(b))?a-b:NaN;}).filter(d=>!isNaN(d));
    Plotly.react(el,[
      {type:'histogram',x:pairs,name:'Differences',opacity:0.75,marker:{color:PAL[0]+'CC'}},
      {type:'scatter',x:[0,0],y:[0,pairs.length*0.2||1],mode:'lines',name:'H₀: diff=0',line:{color:PAL[3],width:2.5,dash:'dash'}},
    ],{...L,xaxis:{...L.xaxis,title:col1+' − '+col2},yaxis:{...L.yaxis,title:'Count'}},OPT);
  }
  else if((r._type==='anova1'||r._type==='kruskal_wallis')&&ds&&cfg){
    const dep=cfg.dep,grp=cfg.grp;if(!dep||!grp)return;
    const groups={};
    ds.rows.forEach(row=>{if(row[grp]!=null&&row[grp]!==''){const g=String(row[grp]);if(!groups[g])groups[g]=[];const v=Number(row[dep]);if(!isNaN(v))groups[g].push(v);}});
    Plotly.react(el,
      Object.entries(groups).map(([g,vals],i)=>({type:'box',y:vals,name:g,boxpoints:'outliers',jitter:0.25,marker:{color:PAL[i%PAL.length],size:4,opacity:0.7},line:{color:PAL[i%PAL.length],width:2},fillcolor:PAL[i%PAL.length]+'22'})),
      {...L,yaxis:{...L.yaxis,title:dep},boxmode:'group'},OPT
    );
  }
  else if(r._type==='corr'&&ds&&r.cols?.length>=2){
    const c1=r.cols[0],c2=r.cols[1];
    if(!ds.columns.includes(c1)||!ds.columns.includes(c2))return;
    const x=getNum(ds,c1),y_=getNum(ds,c2);if(!x.length||!y_.length)return;
    const rval=r.matrix[0][1].r;
    const mx=vmean(x),my=vmean(y_),sx=vstd(x),sy=vstd(y_);
    const slope=rval*sy/sx,intercept=my-slope*mx;
    const xmin=Math.min(...x),xmax=Math.max(...x);
    Plotly.react(el,[
      {type:'scatter',mode:'markers',x,y:y_,marker:{color:PAL[0],size:6,opacity:0.6},name:'Data',hovertemplate:`${c1}: %{x}<br>${c2}: %{y}<extra></extra>`},
      {type:'scatter',mode:'lines',x:[xmin,xmax],y:[slope*xmin+intercept,slope*xmax+intercept],line:{color:PAL[1],width:2},name:`r = ${rval.toFixed(3)}`},
    ],{...L,xaxis:{...L.xaxis,title:c1},yaxis:{...L.yaxis,title:c2}},OPT);
  }
  else if(r._type==='ols'&&r.beta?.length){
    const nm=r.names.slice(1),betas=r.beta.slice(1),lo=r.ci_lo.slice(1),hi=r.ci_hi.slice(1);
    if(!nm.length)return;
    Plotly.react(el,[{
      type:'scatter',mode:'markers',x:betas,y:nm,
      marker:{color:betas.map(b=>b>0?PAL[0]:PAL[3]),size:12,symbol:'diamond'},
      error_x:{type:'data',symmetric:false,array:hi.map((h,i)=>h-betas[i]),arrayminus:betas.map((b,i)=>b-lo[i]),thickness:2.5,width:6},
      name:'β (95% CI)',
    },{
      type:'scatter',mode:'lines',x:[0,0],y:[nm[0],nm[nm.length-1]],
      line:{color:'#D1D5DB',width:1.5,dash:'dot'},showlegend:false,
    }],{...L,xaxis:{...L.xaxis,title:'Coefficient (β)',zeroline:true,zerolinecolor:'#D1D5DB',zerolinewidth:1.5},yaxis:{...L.yaxis,autorange:'reversed',title:''}},OPT);
  }
  else if(r._type==='chisq'&&r.obs){
    const std_res=r.v1.map((v1,i)=>r.v2.map((_,j)=>{const o=r.obs[i][j],e=r.exp[i][j];return e>0?(o-e)/Math.sqrt(e):0;}));
    Plotly.react(el,[{
      type:'heatmap',z:std_res,x:r.v2.map(String),y:r.v1.map(String),
      colorscale:[['0','#2166AC'],['0.5','white'],['1','#D73027']],
      zmid:0,zmin:-3.5,zmax:3.5,
      text:r.v1.map((v1,i)=>r.v2.map((_,j)=>`O:${r.obs[i][j]}<br>E:${r.exp[i][j].toFixed(1)}`)),
      texttemplate:'%{text}',
      hovertemplate:'%{y} × %{x} — Std.Res: %{z:.2f}<extra></extra>',
    }],{...L,title:{text:'Standardized Residuals',font:{size:11}},margin:{...L.margin,t:40}},OPT);
  }
  else if(r._type==='descriptive'&&ds&&r.stats){
    const cols=r.stats.map(s=>s.col).filter(c=>ds.types[c]==='numeric').slice(0,5);
    if(!cols.length)return;
    Plotly.react(el,
      cols.map((c,i)=>({type:'violin',y:getNum(ds,c),name:c,box:{visible:true},meanline:{visible:true},line:{color:PAL[i%PAL.length]},fillcolor:PAL[i%PAL.length]+'22',opacity:0.8,points:false})),
      {...L,violinmode:'group'},OPT
    );
  }
  else if((r._type==='model_logistic'||r._type==='model_poisson'||r._type==='model_ols'||r._type==='model_ridge'||r._type==='model_negbinom')&&r.beta?.length){
    const nm=r.names.slice(1),betas=r.beta.slice(1),lo=(r.ci_lo||r.beta.map(()=>0)).slice(1),hi=(r.ci_hi||r.beta.map(()=>0)).slice(1);
    if(!nm.length)return;
    Plotly.react(el,[{
      type:'scatter',mode:'markers',x:betas,y:nm,
      marker:{color:betas.map(b=>b>0?PAL[0]:PAL[3]),size:11,symbol:'diamond'},
      error_x:{type:'data',symmetric:false,array:hi.map((h,i)=>h-betas[i]),arrayminus:betas.map((b,i)=>b-lo[i]),thickness:2.5,width:5},
      name:'Coefficient (95% CI)',
    },{
      type:'scatter',mode:'lines',x:[0,0],y:[nm[0],nm[nm.length-1]],
      line:{color:'#D1D5DB',width:1.5,dash:'dot'},showlegend:false,
    }],{...L,xaxis:{...L.xaxis,title:'Estimate',zeroline:true,zerolinecolor:'#D1D5DB',zerolinewidth:1.5},yaxis:{...L.yaxis,autorange:'reversed',title:''}},OPT);
  }
}

function AnalyzeModule({state,dispatch}){
  const[test,setTest]=useState('descriptive');
  const[cfg,setCfg]=useState({});
  const[result,setResult]=useState(null);
  const[loading,setLoading]=useState(false);
  const ds=state.datasets.find(d=>d.id===state.activeId);
  const nc=ds?numCols(ds):[];const cc=ds?catCols(ds):[];
  const upd=(k,v)=>setCfg(c=>({...c,[k]:v}));
  const groups=[...new Set(TESTS.map(t=>t.g))];

  function run(){
    if(!ds)return;
    if(test.startsWith('_nav_'))return;
    setLoading(true);
    setTimeout(()=>{
      try{
        let r=null;
        if(test==='descriptive'){
          const cols=cfg.cols?.length?cfg.cols:nc;
          r={_type:'descriptive',stats:cols.map(col=>({col,...describe(getNum(ds,col))}))};
        }else if(test==='ttest1'){
          const v=getNum(ds,cfg.col||nc[0]);r={_type:'ttest1',...ttest1(v,Number(cfg.mu0||0))};
        }else if(test==='ttest2'){
          const grpCol=cfg.groupCol;const depCol=cfg.col||nc[0];
          const v1=grpCol&&cfg.g1?ds.rows.filter(r=>String(r[grpCol])===String(cfg.g1)).map(r=>Number(r[depCol])).filter(v=>!isNaN(v)):getNum(ds,cfg.col1||nc[0]);
          const v2=grpCol&&cfg.g2?ds.rows.filter(r=>String(r[grpCol])===String(cfg.g2)).map(r=>Number(r[depCol])).filter(v=>!isNaN(v)):getNum(ds,cfg.col2||nc[1]);
          r={_type:'ttest2',...ttest2(v1,v2,cfg.eqvar||false)};
        }else if(test==='ttestpaired'){
          r={_type:'ttestpaired',...ttestpaired(getNum(ds,cfg.col1||nc[0]),getNum(ds,cfg.col2||nc[1]))};
        }else if(test==='anova1'){
          r={_type:'anova1',...anova1(ds.rows,cfg.dep||nc[0],cfg.grp||cc[0])};
        }else if(test==='correlation'){
          const cols=cfg.cols?.length?cfg.cols:nc.slice(0,6);
          r={_type:'corr',...corrMatrix(ds.rows,cols,cfg.method||'pearson')};
        }else if(test==='regression'){
          const dep=cfg.dep||nc[0];const preds=cfg.preds||[];
          if(!preds.length){alert('Select at least one predictor.');setLoading(false);return;}
          const yv=getNum(ds,dep);const Xm=ds.rows.map(row=>preds.map(p=>Number(row[p]))).filter((_,i)=>!isNaN(yv[i]));const yc=yv.filter(v=>!isNaN(v));
          r={_type:'ols',dep,preds,names:['(Intercept)',...preds],...olsRegression(yc,Xm)};
        }else if(test==='mannwhitney'){
          r={_type:'mw',...mannWhitney(getNum(ds,cfg.col1||nc[0]),getNum(ds,cfg.col2||nc[1]))};
        }else if(test==='chisq'){
          r={_type:'chisq',...chiSqIndep(ds.rows,cfg.col1||cc[0],cfg.col2||cc[1])};
        }else if(test==='wilcoxon'){
          r={_type:'wilcoxon_sr',...wilcoxonSR(getNum(ds,cfg.col1||nc[0]),getNum(ds,cfg.col2||nc[1]))};
        }else if(test==='kruskal'){
          r={_type:'kruskal_wallis',...kruskalWallis(ds.rows,cfg.dep||nc[0],cfg.grp||cc[0]||ds.columns[0])};
        }
        if(r){setResult(r);dispatch({type:'ADD_ANALYSIS',a:{id:'an_'+Date.now(),test,cfg,result:r,dsId:ds.id,t:Date.now()}});}
      }catch(e){console.error(e);alert('Analysis error: '+e.message);}
      setLoading(false);
    },40);
  }

  if(!ds)return(<div style={{display:'flex',flexDirection:'column',height:'100%'}}><div className="module-header"><div className="module-title">Analysis Lab</div></div><div className="empty-state"><div style={{fontSize:48,opacity:0.18}}>∑</div><p style={{color:'var(--text-muted)'}}>Load a dataset first.</p></div></div>);

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div className="module-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div className="module-title">Analysis Lab</div><div className="module-subtitle">Statistical tests, models, and summaries</div></div>
        {state.datasets.length>1&&<select className="select-field" style={{fontSize:12}} value={state.activeId||''} onChange={e=>dispatch({type:'SET_ACTIVE',id:e.target.value})}>{state.datasets.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}</select>}
      </div>
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        {/* Test list – wizard */}
        <div style={{width:216,borderRight:'1px solid rgba(255,255,255,0.06)',overflowY:'auto',background:'var(--navy)',flexShrink:0,display:'flex',flexDirection:'column'}}>
          <AnalysisWizardPanel test={test} setTest={setTest} setResult={setResult} setCfg={setCfg} dispatch={dispatch}/>
        </div>
        {/* Config */}
        <div className="side-panel" style={{width:256,borderRight:'1px solid var(--border)',background:'white'}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:12}}>{TESTS.find(t=>t.id===test)?.l}</div>
          <AnalysisCfg test={test} cfg={cfg} upd={upd} nc={nc} cc={cc} ds={ds}/>
          <button className="btn btn-gold" onClick={run} style={{width:'100%',marginTop:14}} disabled={loading}>{loading?'Running…':'Run Analysis'}</button>
          {state.analyses.length>0&&(
            <div style={{marginTop:20}}>
              <div className="section-head" style={{paddingLeft:0,fontSize:10}}>Recent ({state.analyses.length})</div>
              {state.analyses.slice(0,5).map(a=>(
                <div key={a.id} onClick={()=>setResult(a.result)} style={{fontSize:11,color:'var(--text-muted)',padding:'4px 0',cursor:'pointer',borderBottom:'1px solid var(--border)'}}>
                  {TESTS.find(t=>t.id===a.test)?.l||a.test}
                </div>
              ))}
            </div>
          )}
        </div>
        {/* Results */}
        <div className="results-panel">
          {result?<AnalysisResult r={result} test={test} ds={ds} cfg={cfg}/>:<div className="empty-state"><div style={{fontSize:48,opacity:0.15}}>∑</div><p style={{color:'var(--text-muted)',fontSize:13}}>Configure and run an analysis</p></div>}
        </div>
      </div>
    </div>
  );
}

function AnalysisCfg({test,cfg,upd,nc,cc,ds}){
  const ac=ds?ds.columns:[];
  if(test==='descriptive')return(
    <div><div style={{fontSize:12,fontWeight:500,marginBottom:6}}>Variables (blank = all numeric)</div>
    <div style={{maxHeight:200,overflowY:'auto'}}>
      {nc.map(c=><label key={c} className="check-row"><input type="checkbox" checked={(cfg.cols||[]).includes(c)} onChange={e=>upd('cols',e.target.checked?[...(cfg.cols||[]),c]:(cfg.cols||[]).filter(x=>x!==c))}/>{c}</label>)}
    </div></div>
  );
  if(test==='ttest1')return(<div style={{display:'flex',flexDirection:'column',gap:11}}>
    <div><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>Variable</label><select className="select-field" value={cfg.col||''} onChange={e=>upd('col',e.target.value)} style={{width:'100%',fontSize:12}}><option value="">Select…</option>{nc.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
    <div><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>H₀ mean (μ₀)</label><input className="input-field" type="number" value={cfg.mu0??0} onChange={e=>upd('mu0',e.target.value)} style={{width:'100%',fontSize:12}}/></div>
  </div>);
  if(test==='ttest2')return(<div style={{display:'flex',flexDirection:'column',gap:12}}>
    <DragVarPanel ds={ds}
      slotDefs={[
        {key:'col',label:'Outcome Variable',hint:'Numeric dependent variable',types:['numeric']},
        {key:'groupCol',label:'Grouping Variable',hint:'Categorical group column'},
      ]}
      values={{col:cfg.col||null,groupCol:cfg.groupCol||null}}
      onChange={v=>{upd('col',v.col||'');upd('groupCol',v.groupCol||'');}}
    />
    {cfg.groupCol&&(()=>{const grps=[...new Set(ds.rows.map(r=>r[cfg.groupCol]).filter(Boolean))];return(
      <div style={{display:'flex',gap:8}}>
        {['g1','g2'].map((k,i)=>(
          <div key={k} style={{flex:1}}>
            <label style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em',display:'block',marginBottom:4}}>Group {i+1}</label>
            <select className="select-field" value={cfg[k]||''} onChange={e=>upd(k,e.target.value)} style={{width:'100%',fontSize:12}}>
              <option value="">Select…</option>{grps.map(g=><option key={g} value={g}>{g}</option>)}
            </select>
          </div>
        ))}
      </div>
    );})()}
    <label className="check-row" style={{fontSize:12}}><input type="checkbox" checked={cfg.eqvar||false} onChange={e=>upd('eqvar',e.target.checked)}/> Assume equal variances (Student's t)</label>
    <div style={{fontSize:11,padding:'8px 11px',background:'rgba(74,127,168,0.07)',borderRadius:7,color:'var(--blue)',lineHeight:1.6}}>
      {cfg.eqvar?"Student's two-sample t-test":"Welch's t-test (recommended — unequal variances)"}
    </div>
  </div>);
  if(test==='ttestpaired'||test==='mannwhitney')return(<div style={{display:'flex',flexDirection:'column',gap:11}}>
    {['col1','col2'].map((k,i)=><div key={k}><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>Variable {i+1}</label><select className="select-field" value={cfg[k]||''} onChange={e=>upd(k,e.target.value)} style={{width:'100%',fontSize:12}}><option value="">Select…</option>{nc.map(c=><option key={c} value={c}>{c}</option>)}</select></div>)}
  </div>);
  if(test==='anova1')return(<div style={{display:'flex',flexDirection:'column',gap:11}}>
    <div><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>Dependent Variable</label><select className="select-field" value={cfg.dep||''} onChange={e=>upd('dep',e.target.value)} style={{width:'100%',fontSize:12}}><option value="">Select…</option>{nc.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
    <div><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>Group Variable</label><select className="select-field" value={cfg.grp||''} onChange={e=>upd('grp',e.target.value)} style={{width:'100%',fontSize:12}}><option value="">Select…</option>{ac.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
  </div>);
  if(test==='correlation')return(<div>
    <div style={{fontSize:12,fontWeight:500,marginBottom:6}}>Variables (blank = first 6 numeric)</div>
    <div style={{maxHeight:160,overflowY:'auto',marginBottom:10}}>
      {nc.map(c=><label key={c} className="check-row"><input type="checkbox" checked={(cfg.cols||[]).includes(c)} onChange={e=>upd('cols',e.target.checked?[...(cfg.cols||[]),c]:(cfg.cols||[]).filter(x=>x!==c))}/>{c}</label>)}
    </div>
    <div><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>Method</label><select className="select-field" value={cfg.method||'pearson'} onChange={e=>upd('method',e.target.value)} style={{width:'100%',fontSize:12}}><option value="pearson">Pearson</option><option value="spearman">Spearman</option></select></div>
  </div>);
  if(test==='regression'){
    const preds=cfg.preds||[];
    const available=nc.filter(c=>c!==cfg.dep&&!preds.includes(c));
    return(<div style={{display:'flex',flexDirection:'column',gap:11}}>
      <div>
        <label style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em',display:'block',marginBottom:4}}>Outcome (Y)</label>
        <select className="select-field" value={cfg.dep||''} onChange={e=>upd('dep',e.target.value)} style={{width:'100%',fontSize:12}}>
          <option value="">Select…</option>{nc.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
      </div>
      <div>
        <label style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em',display:'block',marginBottom:6}}>Predictors (X) — check or drag</label>
        <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:6}}>
          {available.map(c=>(
            <div key={c} className="var-chip num" onClick={()=>upd('preds',[...preds,c])} style={{cursor:'pointer'}} title="Click to add">
              <span className="var-badge">#</span>{c}<span style={{marginLeft:4,opacity:0.5,fontSize:11}}>+</span>
            </div>
          ))}
        </div>
        {preds.length>0&&(
          <div style={{display:'flex',flexWrap:'wrap',gap:5,padding:'7px',background:'rgba(74,127,168,0.06)',borderRadius:7,border:'1px solid rgba(74,127,168,0.15)'}}>
            {preds.map(c=>(
              <div key={c} className="var-chip num pop-in">
                <span className="var-badge">#</span>{c}
                <span onClick={()=>upd('preds',preds.filter(x=>x!==c))} style={{marginLeft:5,cursor:'pointer',opacity:0.45,fontSize:13}}>×</span>
              </div>
            ))}
          </div>
        )}
      </div>
      {cfg.dep&&preds.length>0&&(
        <div className="model-formula">{cfg.dep} ~ {preds.join(' + ')}</div>
      )}
    </div>);
  }
  if(test==='wilcoxon')return(<div style={{display:'flex',flexDirection:'column',gap:11}}>
    <div style={{fontSize:12,color:'var(--text-muted)',padding:'8px 10px',background:'rgba(245,158,11,0.07)',borderRadius:7,border:'1px solid rgba(245,158,11,0.15)',lineHeight:1.6}}>
      Select two <strong>paired</strong> numeric columns (same length, matched rows).
    </div>
    {['col1','col2'].map((k,i)=><div key={k}><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>Variable {i+1}</label><select className="select-field" value={cfg[k]||''} onChange={e=>upd(k,e.target.value)} style={{width:'100%',fontSize:12}}><option value="">Select…</option>{nc.map(c=><option key={c} value={c}>{c}</option>)}</select></div>)}
  </div>);
  if(test==='kruskal')return(<div style={{display:'flex',flexDirection:'column',gap:11}}>
    <div style={{fontSize:12,color:'var(--text-muted)',padding:'8px 10px',background:'rgba(245,158,11,0.07)',borderRadius:7,border:'1px solid rgba(245,158,11,0.15)',lineHeight:1.6}}>
      Non-parametric alternative to one-way ANOVA. No normality assumption.
    </div>
    <div><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>Outcome (numeric)</label><select className="select-field" value={cfg.dep||''} onChange={e=>upd('dep',e.target.value)} style={{width:'100%',fontSize:12}}><option value="">Select…</option>{nc.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
    <div><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>Grouping Variable</label><select className="select-field" value={cfg.grp||''} onChange={e=>upd('grp',e.target.value)} style={{width:'100%',fontSize:12}}><option value="">Select…</option>{ac.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
  </div>);
  if(test==='chisq')return(<div style={{display:'flex',flexDirection:'column',gap:11}}>
    {['col1','col2'].map((k,i)=><div key={k}><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>Variable {i+1}</label><select className="select-field" value={cfg[k]||''} onChange={e=>upd(k,e.target.value)} style={{width:'100%',fontSize:12}}><option value="">Select…</option>{ac.map(c=><option key={c} value={c}>{c}</option>)}</select></div>)}
  </div>);
  return null;
}

function AnalysisResultTable({r,test}){
  if(!r)return null;
  const g3=n=>Array.from({length:n},(_, i)=>'1fr').join(' ');
  function copyJSON(){navigator.clipboard?.writeText(JSON.stringify(r,null,2));}

    <div className="fade-in">
      <h2 style={{fontFamily:"'Crimson Pro',serif",fontSize:22,fontWeight:600,marginBottom:16}}>Descriptive Statistics</h2>
      <div style={{overflowX:'auto'}}>
        <table className="result-table">

        {[['t statistic',fmt(r.t,4)],['df',fmt(r.df,2)],['p-value',fmtP(r.p)]].map(([l,v])=><StatCard key={l} label={l} value={v}/>)}
      </div>
      <div style={{padding:'12px 16px',background:'rgba(74,127,168,0.07)',borderRadius:8,marginBottom:16}}>
        <div style={{fontWeight:600,fontSize:12,marginBottom:4,color:'var(--blue)'}}>95% Confidence Interval {r.mean1!==undefined?'(difference)':''}</div>
        <div style={{fontFamily:'monospace',fontSize:14}}>[{fmt(r.ci_lo,4)},&nbsp;&nbsp;{fmt(r.ci_hi,4)}]</div>
